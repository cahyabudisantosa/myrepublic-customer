<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MoraBilling Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple: #6D28D9; --font: 'Plus Jakarta Sans', sans-serif; }
    html, body { height: 100%; background: #F3F4F6; font-family: var(--font); color: #111827; }
    #root { height: 100%; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-bg { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .card-enter { animation: fadeIn 0.3s ease forwards; }
    .sheet-enter { animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .skeleton { background: #E5E7EB; border-radius: 8px; animation: pulse-bg 1.5s ease-in-out infinite; }
    button { font-family: var(--font); cursor: pointer; }
    input, select, textarea { outline: none; font-family: var(--font); }
    input:focus, select:focus, textarea:focus { outline: 2px solid #7C3AED; outline-offset: -1px; }
    ::-webkit-scrollbar { display: none; }
    .sticky-top { position: sticky; top: 0; z-index: 40; background: #F3F4F6; padding: 15px 16px 5px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; margin-bottom: 10px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useMemo } = React;

  // ===== KONFIGURASI UTAMA SISTEM =====
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFbmU1b1aInelEnaWwO8PjaLnUEiy-CAvoN1WoN9GkEFTiYEJ_kam8NVLtD4FKQESwBA/exec";
  const STORAGE_KEY = "morabilling-pro-v24"; // Reset otomatis cache versi lama
  const PIN_RAHASIA = "1234";
  const HARI_TEMPO = 6;

  const vibe = () => { if (navigator.vibrate) navigator.vibrate(40); };
  const getNow = () => new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" }));
  const formatRupiah = (n) => "Rp " + Number(n || 0).toLocaleString("id-ID");
  const formatNumberInput = (n) => n ? Number(n.toString().replace(/\D/g, "")).toLocaleString('id-ID') : "";
  const cleanPhone = (wa) => { let num = String(wa || "").replace(/\D/g, ""); if (num.startsWith("0")) return "62" + num.substring(1); if (num.startsWith("8")) return "62" + num; return num; };

  const formatDate = (dateStr) => {
    if (!dateStr) return "-";
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    const m = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
    return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
  };

  // ===== KECERDASAN LEDGER (SISTEM AKUNTANSI BILLING) =====
  const getCRMStats = (p) => {
    if (!p.joinDate) return { usia: 1, bayar: 0, nunggak: 0, tglTerbit: 1 };
    const d = new Date(p.joinDate);
    if (isNaN(d.getTime())) return { usia: 1, bayar: 0, nunggak: 0, tglTerbit: 1 };
    
    const startY = d.getFullYear();
    const startM = d.getMonth();
    const tglTerbit = d.getDate();
    
    const today = getNow();
    let usia = (today.getFullYear() - startY) * 12 + (today.getMonth() - startM);
    if (today.getDate() >= tglTerbit) { usia += 1; }
    usia = Math.max(1, usia); 
    
    let bayar = parseInt(p.paidCycle, 10);
    if (isNaN(bayar)) bayar = 0;
    
    const nunggak = Math.max(0, usia - bayar);
    
    return { usia, bayar, nunggak, tglTerbit };
  };

  const getBillingPhase = (p, crm) => {
    if (p.statusKlien === "Putus") return { phase: "putus", label: "Berhenti Berlangganan", color: "#6B7280", bg: "#E5E7EB", urgent: false };

    const today = getNow();
    today.setHours(0, 0, 0, 0);
    
    const validTglTerbit = (crm && crm.tglTerbit) ? crm.tglTerbit : 1;
    const terbitBulanIni = new Date(today.getFullYear(), today.getMonth(), validTglTerbit);
    const jatuhTempoBulanIni = new Date(today.getFullYear(), today.getMonth(), validTglTerbit + HARI_TEMPO);
    
    if (crm.nunggak > 0) {
       if(crm.nunggak === 1 && today < jatuhTempoBulanIni && today >= terbitBulanIni) {
           return { phase: "aktif", label: `JT ${Math.ceil((jatuhTempoBulanIni - today) / 86400000)} hari lagi`, color: "#D97706", bg: "#FFFBEB", urgent: false };
       }
       return { phase: "lewat", label: `Tagihan ${crm.nunggak} Bulan!`, color: "#DC2626", bg: "#FEF2F2", urgent: true };
    }

    const nextTerbit = new Date(terbitBulanIni);
    if (today >= terbitBulanIni) {
       nextTerbit.setMonth(nextTerbit.getMonth() + 1);
    }
    const daysToNext = Math.ceil((nextTerbit - today) / 86400000);
    return { phase: "normal", label: `Aman. Rilis ${daysToNext} hari lagi`, color: "#059669", bg: "#ECFDF5", urgent: false };
  };

  const buildWALink = (p, crm) => {
    const phone = cleanPhone(p.noWa);
    const multiplier = crm.nunggak > 0 ? crm.nunggak : 1;
    const nominal = p.tagihan * multiplier;
    const msgText = `Halo *Kak ${p.nama}* 👋\n\nMengingatkan tagihan WiFi MyRepublic ID *${p.customerId}* Anda.\n\nTotal Tagihan : *${formatRupiah(nominal)}* (${crm.nunggak > 0 ? crm.nunggak + ' Bulan' : 'Bulan Ini'})\n\nMohon segera melakukan pembayaran agar layanan tetap aktif ya Kak 😊\nTerima kasih! 🙏`;
    return `https://wa.me/${phone}?text=${encodeURIComponent(msgText)}`;
  };

  const exportToCSV = (data) => {
    const headers = ["ID Pelanggan", "Nama", "No WA", "Tagihan Bulanan", "Tanggal Pasang", "Usia Berlangganan (Bulan)", "Total Bayar (Bulan)", "Tagihan (Bulan)", "Status Pelanggan", "Catatan"];
    const rows = data.map(p => {
      const crm = getCRMStats(p);
      return [p.customerId, p.nama, p.noWa, p.tagihan, p.joinDate, crm.usia, crm.bayar, crm.nunggak, p.statusKlien, `"${(p.catatan || "").replace(/"/g, '""')}"`];
    });
    const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
    const link = document.createElement("a"); link.href = encodeURI(csvContent); link.download = `MoraBilling_${getNow().getTime()}.csv`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  };

  const SkeletonLoader = () => (
    <div style={{ background: "white", padding: 16, borderRadius: 16, marginBottom: 12, display: "flex", gap: 15 }}>
      <div style={{ flex: 1 }}><div className="skeleton" style={{ width: "40%", height: 14, marginBottom: 10 }}></div><div className="skeleton" style={{ width: "80%", height: 20, marginBottom: 10 }}></div><div className="skeleton" style={{ width: "60%", height: 12 }}></div></div>
    </div>
  );

  const LoginScreen = ({ onLogin }) => {
    const [pin, setPin] = useState("");
    const [error, setError] = useState(false);
    return (
      <div style={{ height: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "linear-gradient(160deg, #5B21B6, #3B0764)", padding: 20 }}>
        <div style={{ background: "white", padding: 30, borderRadius: 24, width: "100%", maxWidth: 360, textAlign: "center", boxShadow: "0 10px 25px rgba(0,0,0,0.2)" }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>[+]</div>
          <h2 style={{ margin: "0 0 5px", color: "#111827", fontWeight: 800 }}>MoraBilling</h2>
          <p style={{ margin: "0 0 20px", color: "#6B7280", fontSize: 13, fontWeight: 500 }}>Sistem Customer Management.</p>
          <input type="password" value={pin} onChange={(e) => {
              vibe(); const num = e.target.value.replace(/\D/g, ""); setPin(num);
              if (num.length === 4) { if (num === PIN_RAHASIA) setTimeout(onLogin, 200); else { setError(true); setTimeout(() => { setError(false); setPin(""); }, 800); } }
            }} placeholder="• • • •" style={{ width: "100%", textAlign: "center", fontSize: 24, letterSpacing: 15, padding: 15, borderRadius: 12, border: error ? "2px solid #DC2626" : "2px solid #E5E7EB", marginBottom: 10, background: error ? "#FEF2F2" : "#F9FAFB", fontWeight: 800, color: error ? "#DC2626" : "#111827" }} maxLength={4} />
          {error && <div style={{color:"#DC2626", fontSize:12, fontWeight:700}}>PIN Salah.</div>}
        </div>
      </div>
    );
  };

  const AddForm = ({ initialData, onSave, onDelete, onClose }) => {
    const [form, setForm] = useState(initialData || { customerId: "", nama: "", noWa: "", tagihan: "", joinDate: "", paidCycle: 0, statusKlien: "Aktif", catatan: "" });
    const [tagihanUI, setTagihanUI] = useState(initialData ? formatNumberInput(initialData.tagihan) : "");
    const [errorMsg, setErrorMsg] = useState("");
    const [errorFields, setErrorFields] = useState([]);
    
    const getInputStyle = (field) => ({ width: "100%", border: errorFields.includes(field) ? "2px solid #DC2626" : "1.5px solid #E5E7EB", borderRadius: 10, padding: "11px 14px", fontSize: 14, background: errorFields.includes(field) ? "#FEF2F2" : "#F9FAFB", marginBottom: 12, fontWeight: 500, color: "#111827", boxSizing: "border-box" });
    const labelStyle = { fontSize: 12, fontWeight: 700, color: "#6B7280", display: "block", marginBottom: 6 };

    function handleSave() {
      vibe();
      let errs = [];
      if (!form.customerId.trim()) errs.push("customerId");
      if (!form.nama.trim()) errs.push("nama");
      if (!form.tagihan) errs.push("tagihan");
      if (!form.joinDate) errs.push("joinDate"); 

      if (errs.length > 0) { setErrorFields(errs); setErrorMsg("Mohon lengkapi kotak merah."); return; }
      const tglPsg = new Date(form.joinDate);
      const terbit = tglPsg.getDate();
      onSave({...form, tanggalTerbit: terbit});
    }

    return (
      <div style={{ padding: "0 20px 24px", background: "white", borderRadius: "24px 24px 0 0" }}>
        <div style={{ display: "flex", justifyContent: "center", padding: "12px 0 16px" }}><div style={{ width: 40, height: 5, background: "#E5E7EB", borderRadius: 3 }}></div></div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800 }}>{initialData ? "Edit Pelanggan" : "Pelanggan Baru"}</h3>
          <button onClick={()=>{vibe(); onClose();}} style={{ background: "#F3F4F6", border: "none", borderRadius: 10, width: 36, height: 36, fontSize: 14, fontWeight: 700, color: "#6B7280" }}>X</button>
        </div>

        <label style={labelStyle}>ID Pelanggan *</label>
        <input style={{...getInputStyle("customerId"), border: errorFields.includes("customerId") ? "2px solid #DC2626" : "2px solid #DDD6FE", background: errorFields.includes("customerId") ? "#FEF2F2" : "white", fontWeight: 700}} placeholder="MR-0001" value={form.customerId} onChange={e => setForm({...form, customerId: e.target.value.toUpperCase()})} />
        
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div><label style={labelStyle}>Nama *</label><input style={getInputStyle("nama")} placeholder="Budi S." value={form.nama} onChange={e => setForm({...form, nama: e.target.value})} /></div>
          <div><label style={labelStyle}>No. WA</label><input style={getInputStyle("noWa")} type="tel" placeholder="0812..." value={form.noWa} onChange={e => setForm({...form, noWa: e.target.value.replace(/\D/g, "")})} /></div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div>
            <label style={labelStyle}>Tagihan (Rp) *</label>
            <input style={{...getInputStyle("tagihan"), fontWeight:700}} type="tel" placeholder="277.500" value={tagihanUI} onChange={e => {
              const val = e.target.value; setTagihanUI(formatNumberInput(val)); setForm({...form, tagihan: val.replace(/\D/g, "")});
            }} />
          </div>
          <div>
            <label style={labelStyle}>Status Berlangganan</label>
            <select style={{...getInputStyle("statusKlien"), color: form.statusKlien === "Putus" ? "#DC2626" : "#111827", fontWeight: 700}} value={form.statusKlien} onChange={e => setForm({...form, statusKlien: e.target.value})}>
              <option value="Aktif">Aktif</option>
              <option value="Putus">Putus (Churn)</option>
            </select>
          </div>
        </div>
        
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, background: "#F3F4F6", padding: 12, borderRadius: 12, marginBottom: 12 }}>
          <div><label style={labelStyle}>Tgl Pasang *</label><input style={{...getInputStyle("joinDate"), marginBottom:0}} type="date" value={form.joinDate} onChange={e => setForm({...form, joinDate: e.target.value})} /></div>
          <div><label style={labelStyle}>Total Bulan Terbayar</label><input style={{...getInputStyle("paidCycle"), marginBottom:0, fontWeight:800}} type="number" min="0" value={form.paidCycle} onChange={e => setForm({...form, paidCycle: e.target.value})} /></div>
        </div>

        <label style={labelStyle}>Catatan / Keterangan</label>
        <textarea style={{...getInputStyle("catatan"), height: 70, resize: "none"}} placeholder="Contoh: Janji bayar tgl 15..." value={form.catatan} onChange={e => setForm({...form, catatan: e.target.value})} />

        {errorMsg && <div style={{ color: "#DC2626", fontSize: 13, marginBottom: 12, fontWeight: 600, background: "#FEF2F2", padding: "10px", borderRadius: "8px" }}>{errorMsg}</div>}
        
        <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
          {initialData && <button onClick={() => { vibe(); onDelete(initialData.id); }} style={{ padding: "14px 20px", background: "#FEF2F2", color: "#DC2626", border: "none", borderRadius: 12, fontSize: 15, fontWeight: 700 }}>Hapus</button>}
          <button onClick={handleSave} style={{ flex: 1, background: "linear-gradient(135deg, #7C3AED, #4C1D95)", color: "white", border: "none", borderRadius: 12, padding: "14px", fontSize: 15, fontWeight: 700 }}>Simpan Data</button>
        </div>
      </div>
    );
  };

  const App = () => {
    const [isLoggedIn, setIsLoggedIn] = useState(false);
    const [pelanggan, setPelanggan] = useState([]);
    const [loading, setLoading] = useState(true);
    const [filter, setFilter] = useState("semua");
    const [search, setSearch] = useState("");
    const [showForm, setShowForm] = useState(false);
    const [editItem, setEditItem] = useState(null);
    const [toast, setToast] = useState(null);
    const [isOnline, setIsOnline] = useState(navigator.onLine);

    useEffect(() => {
      const handleOnline = () => setIsOnline(true);
      const handleOffline = () => setIsOnline(false);
      window.addEventListener('online', handleOnline);
      window.addEventListener('offline', handleOffline);
      return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
    }, []);

    useEffect(() => {
      if (!isLoggedIn) return;
      try { const cached = localStorage.getItem(STORAGE_KEY); if (cached) setPelanggan(JSON.parse(cached)); } catch (e) {}
      fetchData();
    }, [isLoggedIn]);

    const fetchData = () => {
      if (!navigator.onLine) { showMsg("Offline. Menampilkan data lokal.", "error"); setLoading(false); return; }
      setLoading(true);
      fetch(SCRIPT_URL + "?action=getAll").then(res => res.json()).then(json => {
        if (json.success) { setPelanggan(json.data); localStorage.setItem(STORAGE_KEY, JSON.stringify(json.data)); }
        setLoading(false);
      }).catch(() => { showMsg("Gagal sinkron. Cek koneksi.", "error"); setLoading(false); });
    };

    const showMsg = (msg, type="success") => { setToast({msg, type}); if(type !== "loading") setTimeout(() => setToast(null), 2500); };

    const handleAPI = (updatedData, successMsg) => {
      showMsg("Menyimpan ke server...", "loading");
      fetch(SCRIPT_URL + "?action=save", { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(updatedData) })
        .then(res => res.json())
        .then(json => {
          if(json.success) { showMsg(successMsg); localStorage.setItem(STORAGE_KEY, JSON.stringify(updatedData)); }
          else showMsg("Error Server: " + json.error, "error");
        }).catch(() => showMsg("Gagal menghubungi server.", "error"));
    };

    const handleSave = (data) => {
      if (!navigator.onLine) { showMsg("Gagal. Koneksi Offline!", "error"); return; }
      const dataToSave = { ...data, statusKlien: data.statusKlien || "Aktif", paidCycle: data.paidCycle || 0 };
      const isEdit = !!data.id;
      const updated = isEdit ? pelanggan.map(p => p.id === dataToSave.id ? dataToSave : p) : [...pelanggan, { ...dataToSave, id: String(Date.now()) }];
      
      setPelanggan(updated); setShowForm(false); setEditItem(null);
      handleAPI(updated, "Berhasil disimpan!");
    };

    const catatBayar = (p) => {
      vibe();
      const crm = getCRMStats(p);
      if (crm.nunggak === 0) return; 
      
      if (!navigator.onLine) { showMsg("Gagal. Koneksi Offline!", "error"); return; }
      const currentBayar = parseInt(p.paidCycle, 10) || 0;
      const updatedP = { ...p, paidCycle: currentBayar + 1 };
      const updated = pelanggan.map(x => x.id === p.id ? updatedP : x);
      setPelanggan(updated);
      handleAPI(updated, "Pembayaran 1 Bulan Dicatat!");
    };

    const batalBayar = (p) => {
      vibe();
      if (!navigator.onLine) { showMsg("Gagal. Koneksi Offline!", "error"); return; }
      const currentBayar = parseInt(p.paidCycle, 10) || 0;
      if (currentBayar <= 0) return;
      if (!window.confirm(`Batalkan 1x pembayaran untuk ${p.nama}?`)) return;
      const updatedP = { ...p, paidCycle: currentBayar - 1 };
      const updated = pelanggan.map(x => x.id === p.id ? updatedP : x);
      setPelanggan(updated);
      handleAPI(updated, "Pembayaran Dibatalkan!");
    };

    const handleDelete = (id) => {
      if (!navigator.onLine) { showMsg("Gagal hapus. Koneksi Offline!", "error"); return; }
      if(!window.confirm("Hapus data ini permanen?")) return;
      const updated = pelanggan.filter(x => x.id !== id);
      setPelanggan(updated); setShowForm(false);
      handleAPI(updated, "Data Terhapus");
    };

    const stats = useMemo(() => {
      let lunasCount = 0, belumCount = 0, totalAktif = 0;
      pelanggan.forEach(p => { 
        if (p.statusKlien !== "Putus") {
          totalAktif++;
          const crm = getCRMStats(p);
          if (crm.nunggak === 0) lunasCount++; else belumCount++; 
        }
      });
      return { lunas: lunasCount, belum: belumCount, total: totalAktif };
    }, [pelanggan]);

    const filtered = useMemo(() => {
      return pelanggan.filter(p => {
        const m = (p.nama||"").toLowerCase().includes(search.toLowerCase()) || (p.customerId||"").toLowerCase().includes(search.toLowerCase());
        if (!m) return false;

        if (filter === "putus") return p.statusKlien === "Putus";
        if (p.statusKlien === "Putus") return false; 

        const crm = getCRMStats(p);
        if (filter === "lunas") return crm.nunggak === 0;
        if (filter === "belum") return crm.nunggak > 0;
        
        if (filter === "c1") return crm.usia >= 1 && crm.usia <= 3;
        if (filter === "c4") return crm.usia >= 4 && crm.usia <= 6;
        if (filter === "c7") return crm.usia >= 7 && crm.usia <= 12;
        if (filter === "c12") return crm.usia > 12;

        if (filter === "b0") return crm.bayar >= 0 && crm.bayar <= 3;
        if (filter === "b4") return crm.bayar >= 4 && crm.bayar <= 6;
        if (filter === "b7") return crm.bayar >= 7 && crm.bayar <= 12;
        if (filter === "b12") return crm.bayar > 12;
        
        return true;
      }).sort((a, b) => {
        const aCrm = getCRMStats(a); const bCrm = getCRMStats(b);
        if (aCrm.nunggak !== bCrm.nunggak) return bCrm.nunggak - aCrm.nunggak;
        const aU = aCrm.nunggak > 0 && ["terbit", "aktif", "lewat"].includes(getBillingPhase(a, aCrm).phase);
        const bU = bCrm.nunggak > 0 && ["terbit", "aktif", "lewat"].includes(getBillingPhase(b, bCrm).phase);
        if (aU !== bU) return aU ? -1 : 1;
        return aCrm.tglTerbit - bCrm.tglTerbit;
      });
    }, [pelanggan, filter, search]);

    if (!isLoggedIn) return <LoginScreen onLogin={() => setIsLoggedIn(true)} />;

    return (
      <div style={{ maxWidth: 480, margin: "0 auto", paddingBottom: 100 }}>
        <div style={{ background: "linear-gradient(160deg, #5B21B6, #4C1D95)", padding: "24px 20px 30px", color: "white", borderBottomLeftRadius: 24, borderBottomRightRadius: 24, boxShadow: "0 4px 15px rgba(0,0,0,0.1)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: 2, opacity: 0.7, textTransform: "uppercase", fontWeight: 700 }}>Customer Management</div>
              <div style={{ fontSize: 24, fontWeight: 800 }}>MoraBilling</div>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              {!isOnline && <div style={{ background: "#DC2626", color: "white", padding: "6px 10px", borderRadius: 10, fontSize: 11, fontWeight: 700, display: "flex", alignItems: "center" }}>Offline</div>}
              <button onClick={() => {vibe(); exportToCSV(pelanggan);}} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 12, padding: "8px 12px", color: "white", fontSize: 12, fontWeight: 700 }}>Export CSV</button>
            </div>
          </div>

          <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 16, padding: 15 }}>
            <div style={{ fontSize: 12, opacity: 0.8, marginBottom: 15 }}>Status Pelanggan Aktif ({stats.total} ID)</div>
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1, background: "rgba(16, 185, 129, 0.2)", borderRadius: 10, padding: 12, textAlign: "center" }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: "#34D399" }}>{stats.lunas}</div>
                <div style={{ fontSize: 11, opacity: 0.9, marginTop: 4, fontWeight: 600 }}>Lunas Berjalan</div>
              </div>
              <div style={{ flex: 1, background: "rgba(239, 68, 68, 0.2)", borderRadius: 10, padding: 12, textAlign: "center" }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: "#FCA5A5" }}>{stats.belum}</div>
                <div style={{ fontSize: 11, opacity: 0.9, marginTop: 4, fontWeight: 600 }}>Ada Tagihan</div>
              </div>
            </div>
          </div>
        </div>

        <div className="sticky-top">
          <div style={{ position: "relative", marginBottom: 12 }}>
            <input placeholder="Cari nama atau ID pelanggan..." value={search} onChange={e => setSearch(e.target.value)} style={{ width: "100%", padding: "12px 36px 12px 16px", borderRadius: 12, border: "1px solid #E5E7EB", fontSize: 14, fontWeight: 500, background: "white", color: "#111827", boxSizing: "border-box" }} />
            {search && <button onClick={() => {vibe(); setSearch("");}} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", width: 24, height: 24, borderRadius: "50%", background: "#F3F4F6", color: "#6B7280", border: "none", fontSize: 12, fontWeight: "bold", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>}
          </div>
          
          <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 8, width: "100%" }}>
            {[
              ['semua', 'Semua Aktif'], ['belum', 'Ada Tagihan'], ['lunas', 'Lunas Semua'], ['putus', 'Putus / Churn']
            ].map(([v, l]) => (
              <button key={v} onClick={() => {vibe(); setFilter(v);}} style={{ padding: "6px 14px", borderRadius: 20, border: "1px solid #E5E7EB", fontSize: 12, fontWeight: 700, background: filter === v ? "#111827" : "white", color: filter === v ? "white" : "#6B7280", whiteSpace: "nowrap", transition: "0.2s" }}>{l}</button>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 4, paddingBottom: 4 }}>
            <select 
              value={['c1','c4','c7','c12'].includes(filter) ? filter : ""} 
              onChange={e => { vibe(); setFilter(e.target.value || "semua"); }} 
              style={{ width: "100%", padding: "8px 10px", borderRadius: 10, border: "1px solid #E5E7EB", background: "white", fontSize: 11, fontWeight: 700, color: "#4B5563" }}
            >
              <option value="">Filter Usia...</option>
              <option value="c1">Usia 1-3 Bulan</option>
              <option value="c4">Usia 4-6 Bulan</option>
              <option value="c7">Usia 7-12 Bulan</option>
              <option value="c12">Usia 12+ Bulan</option>
            </select>

            <select 
              value={['b0','b4','b7','b12'].includes(filter) ? filter : ""} 
              onChange={e => { vibe(); setFilter(e.target.value || "semua"); }} 
              style={{ width: "100%", padding: "8px 10px", borderRadius: 10, border: "1px solid #E5E7EB", background: "white", fontSize: 11, fontWeight: 700, color: "#4B5563" }}
            >
              <option value="">Filter Total Bayar...</option>
              <option value="b0">Bayar 0-3x</option>
              <option value="b4">Bayar 4-6x</option>
              <option value="b7">Bayar 7-12x</option>
              <option value="b12">Bayar 12+x</option>
            </select>
          </div>
        </div>

        <div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 12 }}>
          {loading && pelanggan.length === 0 ? (
            <React.Fragment><SkeletonLoader /><SkeletonLoader /><SkeletonLoader /></React.Fragment>
          ) : 
           filtered.length === 0 ? (
            <div style={{ background: "white", borderRadius: 16, padding: "40px 20px", textAlign: "center", border: "1px dashed #D1D5DB" }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>{filter === "belum" ? "🎉" : "🔍"}</div>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#111827", marginBottom: 6 }}>{filter === "belum" ? "Semua Tagihan Aman!" : "Data tidak ditemukan"}</div>
              <div style={{ fontSize: 13, color: "#6B7280", fontWeight: 500 }}>{filter === "belum" ? "Kerja bagus! Tidak ada pelanggan aktif yang memiliki tagihan." : "Coba bersihkan filter dropdown atau ketik nama lain."}</div>
            </div>
           ) :
           filtered.map(p => {
            const isPutus = p.statusKlien === "Putus";
            const crm = getCRMStats(p);
            const status = getBillingPhase(p, crm);

            return (
              <div key={p.id} className="card-enter" style={{ background: "white", padding: 16, borderRadius: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.04)", borderLeft: `5px solid ${isPutus ? "#9CA3AF" : (crm.nunggak === 0 ? "#10B981" : status.color)}`, opacity: isPutus ? 0.6 : 1, transition: "all 0.2s ease", filter: isPutus ? "grayscale(100%)" : "none" }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <div>
                    <div style={{ display:"flex", gap:6, flexWrap: "wrap", alignItems:"center", marginBottom:6 }}>
                      <span style={{ fontSize: 11, fontWeight: 800, color: "#6D28D9", background: "#EDE9FE", padding: "2px 8px", borderRadius: 6 }}>{p.customerId}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, background: "#F3F4F6", color: "#4B5563", padding: "2px 6px", borderRadius: 4 }}>
                        Tgl Pasang: {formatDate(p.joinDate)}
                      </span>
                    </div>
                    <div style={{ fontSize: 16, fontWeight: 800, color: "#111827", textDecoration: isPutus ? "line-through" : "none" }}>{p.nama}</div>
                    <div style={{ fontSize: 12, color: "#6B7280", marginTop: 2, fontWeight: 500 }}>{p.noWa}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 17, fontWeight: 800, color: isPutus ? "#6B7280" : (crm.nunggak === 0 ? "#10B981" : "#111827"), textDecoration: isPutus ? "line-through" : "none" }}>{formatRupiah(p.tagihan)}</div>
                  </div>
                </div>
                
                <div style={{ display: "flex", gap: 6, marginTop: 12, flexWrap: "wrap" }}>
                   <span style={{ background: "#F3F4F6", color: "#374151", padding: "4px 8px", borderRadius: 6, fontSize: 10, fontWeight: 700 }}>Usia: {crm.usia} Bulan</span>
                   <span style={{ background: crm.bayar === 0 ? "#F3F4F6" : "#ECFDF5", color: crm.bayar === 0 ? "#6B7280" : "#059669", padding: "4px 8px", borderRadius: 6, fontSize: 10, fontWeight: 700 }}>Total Bayar: {crm.bayar}x</span>
                   {crm.nunggak > 0 && !isPutus && (
                     <span style={{ background: "#FEF2F2", color: "#DC2626", padding: "4px 8px", borderRadius: 6, fontSize: 10, fontWeight: 800 }}>Tagihan {crm.nunggak} Bulan</span>
                   )}
                </div>

                {p.catatan && <div style={{ fontSize: 11, color: "#4B5563", marginTop: 10, padding: "8px 12px", background: "#FFFBEB", borderLeft: "2px solid #D97706", borderRadius: 4, fontWeight: 500 }}>Catatan: {p.catatan}</div>}

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12, paddingTop: 12, borderTop: "1px dashed #E5E7EB" }}>
                  <div style={{ fontSize: 11, color: "#6B7280", fontWeight: 500 }}>Terbit Tgl <b style={{color:"#111827"}}>{crm.tglTerbit}</b> setiap bulan</div>
                  {!isPutus && crm.nunggak === 0 && <span style={{ background: status.bg, color: status.color, padding: "4px 10px", borderRadius: 12, fontSize: 10, fontWeight: 800 }}>{status.label}</span>}
                </div>

                <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                  {!isPutus && (
                    <React.Fragment>
                      <a onClick={()=>vibe()} href={buildWALink(p, crm)} target="_blank" style={{ flex: 1, background: (status.urgent || crm.nunggak > 0) ? "#DC2626" : "#10B981", color: "white", textAlign: "center", padding: "10px", borderRadius: 10, fontSize: 13, fontWeight: 700, textDecoration: "none", display: "flex", alignItems: "center", justifyContent: "center" }}>WA Reminder</a>
                      
                      <div style={{ display: "flex", flex: 1, gap: 4 }}>
                        <button onClick={() => batalBayar(p)} style={{ flex: 0.3, background: "#FEF2F2", color: "#DC2626", border: "none", borderRadius: 10, fontSize: 16, fontWeight: 800 }}>-</button>
                        
                        <button 
                          onClick={() => catatBayar(p)} 
                          disabled={crm.nunggak === 0} 
                          style={{ 
                            flex: 1, 
                            background: crm.nunggak === 0 ? "#E5E7EB" : "#ECFDF5", 
                            color: crm.nunggak === 0 ? "#9CA3AF" : "#059669", 
                            border: "none", 
                            borderRadius: 10, 
                            fontSize: 12, 
                            fontWeight: 700,
                            cursor: crm.nunggak === 0 ? "not-allowed" : "pointer"
                          }}
                        >
                          {crm.nunggak === 0 ? "✓ Lunas" : "+ Bayar"}
                        </button>
                      </div>
                    </React.Fragment>
                  )}
                  <button onClick={() => { vibe(); setEditItem({...p}); setShowForm(true); }} style={{ flex: isPutus ? 1 : 0.6, padding: "10px", background: "#F3F4F6", border: "1px solid #E5E7EB", borderRadius: 10, fontSize: 13, color: "#374151", fontWeight: 700 }}>Edit</button>
                </div>
              </div>
            );
          })}
        </div>

        <button onClick={() => { vibe(); setEditItem(null); setShowForm(true); }} style={{ position: "fixed", bottom: 24, right: 20, width: 60, height: 60, borderRadius: 30, background: "linear-gradient(135deg, #7C3AED, #4C1D95)", color: "white", border: "none", fontSize: 32, fontWeight: 300, boxShadow: "0 4px 15px rgba(76,29,149,0.4)", zIndex: 50 }}>+</button>

        {showForm && (
          <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end" }}>
            <div className="sheet-enter" style={{ background: "white", width: "100%", borderTopLeftRadius: 24, borderTopRightRadius: 24, maxHeight: "90vh", overflowY: "auto", paddingBottom: "env(safe-area-inset-bottom, 20px)" }}>
              <AddForm initialData={editItem} onSave={handleSave} onDelete={handleDelete} onClose={() => setShowForm(false)} />
            </div>
          </div>
        )}
        
        {toast && (
          <div style={{ position: "fixed", bottom: 100, left: "50%", transform: "translateX(-50%)", background: toast.type === "error" ? "#DC2626" : toast.type === "loading" ? "#4C1D95" : "#111827", color: "white", padding: "12px 24px", borderRadius: 12, fontSize: 13, fontWeight: 700, boxShadow: "0 4px 15px rgba(0,0,0,0.2)", zIndex: 200, display: "flex", alignItems: "center", gap: 10 }}>
            {toast.type === "loading" && <span className="spinner"></span>}
            {toast.msg}
          </div>
        )}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
