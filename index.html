<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoraRepublic CMS</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxZHqpohHYjFpj3mpDvgTF-55hJLoTeaKVLnq7DXS8Lu0RibQcO3_PrbbLISyGTNcvBw/exec";
    const PIN_RAHASIA = "2604";

    function App() {
      const [isLoggedIn, setIsLoggedIn] = React.useState(false);
      const [pin, setPin] = React.useState("");
      const [data, setData] = React.useState([]);
      const [loading, setLoading] = React.useState(false);

      const handleLogin = () => {
        if (pin === PIN_RAHASIA) {
          setIsLoggedIn(true);
          fetchData();
        } else {
          alert("PIN Salah");
        }
      };

      const fetchData = () => {
        setLoading(true);
        fetch(SCRIPT_URL + "?action=getAll")
          .then(res => res.json())
          .then(json => {
            if (json.success) setData(json.data);
            else alert("Error: " + json.error);
            setLoading(false);
          })
          .catch(err => {
            alert("Koneksi gagal: " + err);
            setLoading(false);
          });
      };

      if (!isLoggedIn) {
        return (
          <div style={{textAlign: "center", marginTop: "50px", fontFamily: "sans-serif"}}>
            <h2>Login</h2>
            <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} style={{padding: "10px"}} />
            <button onClick={handleLogin} style={{padding: "10px 20px", marginLeft: "10px"}}>Masuk</button>
          </div>
        );
      }

      return (
        <div style={{fontFamily: "sans-serif", padding: "20px"}}>
          <h2>Dashboard</h2>
          <button onClick={fetchData}>Refresh Data</button>
          {loading ? <p>Memuat...</p> : (
            data.map(p => (
              <div key={p.id} style={{border: "1px solid #ccc", padding: "10px", margin: "10px 0", borderRadius: "8px"}}>
                <strong>{p.nama}</strong><br/>
                ID: {p.customerId} | Tagihan: {p.tagihan}
              </div>
            ))
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
