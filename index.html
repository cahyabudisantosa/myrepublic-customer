<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MoraBilling Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple: #6D28D9; --font: 'Plus Jakarta Sans', sans-serif; }
    html, body { height: 100%; background: #F3F4F6; font-family: var(--font); color: #111827; }
    #root { height: 100%; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse-bg { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .app-wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding-bottom: 100px; }
    .top-banner { background: linear-gradient(160deg, #5B21B6, #4C1D95); padding: 24px 20px 30px; color: white; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .sticky-controls { position: sticky; top: 0; z-index: 40; background: #F3F4F6; padding: 15px 16px 5px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; margin-bottom: 16px; display: grid; gap: 10px; }
    .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; width: 100%; }
    .dropdown-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-bottom: 4px; }
    .customer-grid { display: grid; grid-template-columns: 1fr; gap: 16px; padding: 0 16px; align-items: stretch; }
    .load-more-btn { margin: 20px 16px; padding: 14px; background: white; border: 1px dashed #D1D5DB; border-radius: 16px; color: #4B5563; font-weight: 700; text-align: center; cursor: pointer; display: block; width: calc(100% - 32px); box-sizing: border-box; }
    
    .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); display: flex; align-items: flex-end; justify-content: center; }
    .modal-content { background: white; width: 100%; border-top-left-radius: 24px; border-top-right-radius: 24px; max-height: 90vh; overflow-y: auto; padding: 20px; animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1) forwards; }

    @media (min-width: 640px) {
      .top-banner { border-radius: 24px; margin-top: 20px; padding: 30px; }
      .stats-row { grid-template-columns: repeat(2, 220px); justify-content: flex-start; }
      .sticky-controls { grid-template-columns: 2fr 3fr; padding: 20px; border-radius: 16px; margin: 20px 16px; align-items: center; }
      .dropdown-row { grid-column: 1 / -1; grid-template-columns: 1fr 1fr; max-width: 400px; }
      .customer-grid { grid-template-columns: repeat(2, 1fr); padding: 0 20px; }
      .load-more-btn { width: calc(100% - 40px); margin: 20px auto; max-width: 400px; }
      .modal-overlay { align-items: center; padding: 20px; }
      .modal-content { max-width: 500px; border-radius: 24px; animation: fadeIn 0.3s ease forwards; }
    }
    
    @media (min-width: 1024px) {
      .customer-grid { grid-template-columns: repeat(3, 1fr); }
      .sticky-controls { grid-template-columns: 2fr 3fr 2fr; }
      .dropdown-row { grid-column: auto; max-width: none; }
    }

    .card-enter { animation: fadeIn 0.3s ease forwards; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .skeleton { background: #E5E7EB; border-radius: 8px; animation: pulse-bg 1.5s ease-in-out infinite; }
    button { font-family: var(--font); cursor: pointer; transition: transform 0.1s; }
    button:active { transform: scale(0.97); }
    input, select, textarea { outline: none; font-family: var(--font); }
    input:focus, select:focus, textarea:focus { outline: 2px solid #7C3AED; outline-offset: -1px; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useMemo } = React;

  // 🔗 TEMPELKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvkQeWP7ZgHS_vMp_lWX0TH_2lwyWvCUGgWLW0WUvftaqryUFfj4bR40N2FzDKr1_y1Q/exec";
  
  const STORAGE_KEY = "morabilling-pro-smart-backend"; 
  const ITEM_PER_PAGE = 20;

  const formatRupiah = (n) => "Rp " + Number(n || 0).toLocaleString("id-ID");
  const formatNumberInput = (n) => n ? Number(n.toString().replace(/\D/g, "")).toLocaleString('id-ID') : "";
  const toTitleCase = (str) => { return str.replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase()); };

  const formatDate = (dateStr) => {
    if (!dateStr) return "-";
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    const m = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
    return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
  };

  const exportToCSV = (data) => {
    const headers = ["ID Pelanggan", "Nama", "No WA", "Tagihan Bulanan", "Tanggal Pasang", "Usia Berlangganan (Bulan)", "Total Bayar (Bulan)", "Tagihan (Bulan)", "Status Pelanggan", "Catatan"];
    const rows = data.map(p => {
      return [p.customerId, p.nama, p.noWa, p.tagihan, p.joinDate, p.crm.usia, p.crm.bayar, p.crm.nunggak, p.statusKlien, `"${(p.catatan || "").replace(/"/g, '""')}"`];
    });
    const csvContent = "data:text/csv;charset=utf-8," + [headers.join(",")].concat(rows.map(e => e.join(","))).join("\n");
    const link = document.createElement("a"); link.href = encodeURI(csvContent); link.download = `MoraBilling_Export.csv`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  };

  const SkeletonLoader = () => (
    <div style={{ background: "white", padding: 16, borderRadius: 16, marginBottom: 12, display: "flex", gap: 15, gridColumn: "1 / -1" }}>
      <div style={{ flex: 1 }}><div className="skeleton" style={{ width: "40%", height: 14, marginBottom: 10 }}></div><div className="skeleton" style={{ width: "80%", height: 20, marginBottom: 10 }}></div><div className="skeleton" style={{ width: "60%", height: 12 }}></div></div>
    </div>
  );

  // 🔐 LOGIN SCREEN - HANYA MENGIRIM PIN KE SERVER
  const LoginScreen = ({ onLoginSuccess }) => {
    const [pin, setPin] = useState("");
    const [error, setError] = useState("");
    const [verifying, setVerifying] = useState(false);

    const handleInput = (e) => {
      const num = e.target.value.replace(/\D/g, ""); 
      setPin(num);
      if (num.length === 4) {
        setVerifying(true);
        setError("");
        
        fetch(`${SCRIPT_URL}?action=login&pin=${num}`)
          .then(res => res.json())
          .then(json => {
            setVerifying(false);
            if (json.success && json.authenticated) {
              onLoginSuccess(num);
            } else {
              setError("PIN Salah. Akses Ditolak Server!");
              setPin("");
            }
          })
          .catch(() => {
            setVerifying(false);
            setError("Gagal memanggil server Google.");
            setPin("");
          });
      }
    };

    return (
      <div style={{ height: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "linear-gradient(160deg, #5B21B6, #3B0764)", padding: 20 }}>
        <div style={{ background: "white", padding: 30, borderRadius: 24, width: "100%", maxWidth: 360, textAlign: "center", boxShadow: "0 10px 25px rgba(0,0,0,0.2)" }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>🛡️</div>
          <h2 style={{ margin: "0 0 5px", color: "#111827", fontWeight: 800 }}>MoraBilling</h2>
          <p style={{ margin: "0 0 20px", color: "#6B7280", fontSize: 13, fontWeight: 500 }}>Terhubung ke Google Cloud</p>
          <input type="password" value={pin} onChange={handleInput} disabled={verifying}
            placeholder={verifying ? "•••" : "• • • •"} 
            style={{ width: "100%", textAlign: "center", fontSize: 24, letterSpacing: 15, padding: 15, borderRadius: 12, border: error ? "2px solid #DC2626" : "2px solid #E5E7EB", marginBottom: 10, background: error ? "#FEF2F2" : "#F9FAFB", fontWeight: 800, color: error ? "#DC2626" : "#111827" }} maxLength={4} />
          {verifying && <div style={{color:"#4C1D95", fontSize:12, fontWeight:700}}><span className="spinner" style={{borderTopColor:"#4C1D95", marginRight:6}}></span>Otentikasi Server...</div>}
          {error && <div style={{color:"#DC2626", fontSize:12, fontWeight:700}}>{error}</div>}
        </div>
      </div>
    );
  };

  const AddForm = ({ initialData, onSave, onDelete, onClose }) => {
    const [form, setForm] = useState(initialData || { customerId: "", nama: "", noWa: "", tagihan: "", joinDate: "", paidCycle: 0, statusKlien: "Aktif", catatan: "" });
    const [tagihanUI, setTagihanUI] = useState(initialData ? formatNumberInput(initialData.tagihan) : "");
    const [errorMsg, setErrorMsg] = useState("");
    const [errorFields, setErrorFields] = useState([]);
    
    const getInputStyle = (field) => ({ width: "100%", border: errorFields.includes(field) ? "2px solid #DC2626" : "1.5px solid #E5E7EB", borderRadius: 10, padding: "11px 14px", fontSize: 14, background: errorFields.includes(field) ? "#FEF2F2" : "#F9FAFB", marginBottom: 12, fontWeight: 500, color: "#111827", boxSizing: "border-box" });
    const labelStyle = { fontSize: 12, fontWeight: 700, color: "#6B7280", display: "block", marginBottom: 6 };

    function handleSave() {
      let errs = [];
      if (!form.customerId.trim()) errs.push("customerId");
      if (!form.nama.trim()) errs.push("nama");
      if (!form.tagihan) errs.push("tagihan");
      if (!form.joinDate) errs.push("joinDate"); 

      if (errs.length > 0) { setErrorFields(errs); setErrorMsg("Mohon lengkapi kotak merah."); return; }
      
      const parts = form.joinDate.split("-");
      const terbit = parseInt(parts[2], 10);
      const paidCycleInt = parseInt(form.paidCycle, 10);
      
      onSave({...form, paidCycle: isNaN(paidCycleInt) ? 0 : paidCycleInt, nama: toTitleCase(form.nama.trim()), tanggalTerbit: terbit});
    }

    return (
      <div className="modal-overlay" onClick={(e) => { if(e.target === e.currentTarget) onClose(); }}>
        <div className="modal-content">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800 }}>{initialData ? "Edit Pelanggan" : "Pelanggan Baru"}</h3>
            <button onClick={onClose} style={{ background: "#F3F4F6", border: "none", borderRadius: 10, width: 36, height: 36, fontSize: 14, fontWeight: 700, color: "#6B7280" }}>X</button>
          </div>

          <label style={labelStyle}>ID Pelanggan *</label>
          <input style={{...getInputStyle("customerId"), border: errorFields.includes("customerId") ? "2px solid #DC2626" : "2px solid #DDD6FE", background: errorFields.includes("customerId") ? "#FEF2F2" : "white", fontWeight: 700}} placeholder="MR-0001" value={form.customerId} onChange={e => setForm({...form, customerId: e.target.value.toUpperCase()})} />
          
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div><label style={labelStyle}>Nama *</label><input style={getInputStyle("nama")} placeholder="Budi S." value={form.nama} onChange={e => setForm({...form, nama: e.target.value})} /></div>
            <div><label style={labelStyle}>No. WA</label><input style={getInputStyle("noWa")} type="tel" placeholder="0812..." value={form.noWa} onChange={e => setForm({...form, noWa: e.target.value.replace(/\D/g, "")})} /></div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div>
              <label style={labelStyle}>Tagihan (Rp) *</label>
              <input style={{...getInputStyle("tagihan"), fontWeight:700}} type="tel" placeholder="277.500" value={tagihanUI} onChange={e => {
                const val = e.target.value; setTagihanUI(formatNumberInput(val)); setForm({...form, tagihan: val.replace(/\D/g, "")});
              }} />
            </div>
            <div>
              <label style={labelStyle}>Status Berlangganan</label>
              <select style={{...getInputStyle("statusKlien"), color: form.statusKlien === "Putus" ? "#DC2626" : "#111827", fontWeight: 700}} value={form.statusKlien} onChange={e => setForm({...form, statusKlien: e.target.value})}>
                <option value="Aktif">Aktif</option>
                <option value="Putus">Putus (Churn)</option>
              </select>
            </div>
          </div>
          
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, background: "#F3F4F6", padding: 12, borderRadius: 12, marginBottom: 12 }}>
            <div><label style={labelStyle}>Tgl Pasang *</label><input style={{...getInputStyle("joinDate"), marginBottom:0}} type="date" value={form.joinDate} onChange={e => setForm({...form, joinDate: e.target.value})} /></div>
            <div><label style={labelStyle}>Total Bulan Terbayar</label><input style={{...getInputStyle("paidCycle"), marginBottom:0, fontWeight:800}} type="number" min="0" value={form.paidCycle} onChange={e => setForm({...form, paidCycle: e.target.value})} /></div>
          </div>

          <label style={labelStyle}>Catatan / Keterangan</label>
          <textarea style={{...getInputStyle("catatan"), height: 70, resize: "none"}} placeholder="Contoh: Janji bayar tgl 15..." value={form.catatan} onChange={e => setForm({...form, catatan: e.target.value})} />

          {errorMsg && <div style={{ color: "#DC2626", fontSize: 13, marginBottom: 12, fontWeight: 600, background: "#FEF2F2", padding: "10px", borderRadius: "8px" }}>{errorMsg}</div>}
          
          <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
            {initialData && <button onClick={() => onDelete(initialData)} style={{ padding: "14px 20px", background: "#FEF2F2", color: "#DC2626", border: "none", borderRadius: 12, fontSize: 15, fontWeight: 700 }}>Hapus</button>}
            <button onClick={handleSave} style={{ flex: 1, background: "linear-gradient(135deg, #7C3AED, #4C1D95)", color: "white", border: "none", borderRadius: 12, padding: "14px", fontSize: 15, fontWeight: 700 }}>Kirim ke Server</button>
          </div>
        </div>
      </div>
    );
  };

  const App = () => {
    const [sessionPin, setSessionPin] = useState(null);
    const [pelanggan, setPelanggan] = useState([]);
    const [loading, setLoading] = useState(true);
    
    const [search, setSearch] = useState("");
    const [debouncedSearch, setDebouncedSearch] = useState("");
    const [filter, setFilter] = useState("semua");
    const [visibleCount, setVisibleCount] = useState(ITEM_PER_PAGE);
    
    const [showForm, setShowForm] = useState(false);
    const [editItem, setEditItem] = useState(null);
    const [toast, setToast] = useState(null);

    useEffect(() => {
      if (!sessionPin) return;
      try { const cached = localStorage.getItem(STORAGE_KEY); if (cached) setPelanggan(JSON.parse(cached)); } catch (e) {}
      fetchData();
    }, [sessionPin]);

    useEffect(() => {
      const handler = setTimeout(() => { setDebouncedSearch(search); setVisibleCount(ITEM_PER_PAGE); }, 300);
      return () => clearTimeout(handler);
    }, [search]);

    useEffect(() => { setVisibleCount(ITEM_PER_PAGE); }, [filter]);

    const showMsg = (msg, type="success") => { setToast({msg, type}); if(type !== "loading") setTimeout(() => setToast(null), 2500); };

    // 🌐 TARIK DATA DARI SERVER
    const fetchData = () => {
      setLoading(true);
      fetch(`${SCRIPT_URL}?action=getAll&pin=${sessionPin}`)
        .then(res => res.json())
        .then(json => {
          if (json.success) { 
            setPelanggan(json.data); 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(json.data)); 
          } else {
            showMsg(json.error, "error");
          }
          setLoading(false);
        })
        .catch(() => { showMsg("Gagal sinkron. Cek koneksi.", "error"); setLoading(false); });
    };

    // 🌐 KIRIM PERINTAH KE SERVER
    const callServerAction = (actionParams, payload = null, successMsg) => {
      showMsg("Memproses di Server...", "loading");
      
      const options = payload 
        ? { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ data: payload }) }
        : { method: "GET" };

      fetch(`${SCRIPT_URL}?${actionParams}&pin=${sessionPin}`, options)
        .then(res => res.json())
        .then(json => {
          if(json.success) { 
            showMsg(successMsg); 
            setPelanggan(json.data); // Menerima data terbaru dari server
            localStorage.setItem(STORAGE_KEY, JSON.stringify(json.data)); 
          }
          else showMsg("Server Error: " + json.error, "error");
        }).catch(() => showMsg("Gagal menghubungi server.", "error"));
    };

    const handleSave = (dataToSave) => {
      const isEdit = !!dataToSave.id;
      const updated = isEdit ? pelanggan.map(p => p.id === dataToSave.id ? dataToSave : p) : [...pelanggan, { ...dataToSave, id: String(Date.now()) }];
      setShowForm(false); setEditItem(null);
      callServerAction(`action=save`, updated, "Data Tersimpan di Server!");
    };

    const catatBayar = (p) => {
      if (typeof vibe !== "undefined") vibe();
      callServerAction(`action=bayar&id=${p.id}`, null, "Pembayaran 1 Bulan Dicatat Server!");
    };

    const batalBayar = (p) => {
      if (typeof vibe !== "undefined") vibe();
      if (!window.confirm(`Batalkan 1x pembayaran untuk ${p.nama}?`)) return;
      callServerAction(`action=batal&id=${p.id}`, null, "Pembayaran Dibatalkan Server!");
    };

    const handleDelete = (p) => {
      if(!window.confirm("Hapus data ini permanen?")) return;
      const updated = pelanggan.filter(x => x.id !== p.id);
      setShowForm(false);
      callServerAction(`action=save`, updated, "Data Dihapus Secara Permanen!");
    };

    const stats = useMemo(() => {
      let lunasCount = 0, belumCount = 0, totalAktif = 0;
      pelanggan.forEach(p => { 
        if (p.statusKlien !== "Putus") {
          totalAktif++;
          if (p.crm && p.crm.nunggak === 0) lunasCount++; else belumCount++; 
        }
      });
      return { lunas: lunasCount, belum: belumCount, total: totalAktif };
    }, [pelanggan]);

    const filtered = useMemo(() => {
      return pelanggan.filter(p => {
        const m = (p.nama||"").toLowerCase().includes(debouncedSearch.toLowerCase()) || (p.customerId||"").toLowerCase().includes(debouncedSearch.toLowerCase());
        if (!m) return false;

        if (filter === "putus") return p.statusKlien === "Putus";
        if (p.statusKlien === "Putus") return false; 

        const nunggak = p.crm ? p.crm.nunggak : 0;
        const usia = p.crm ? p.crm.usia : 1;
        const bayar = p.crm ? p.crm.bayar : 0;

        if (filter === "lunas") return nunggak === 0;
        if (filter === "belum") return nunggak > 0;
        if (filter === "c1") return usia >= 1 && usia <= 3;
        if (filter === "c4") return usia >= 4 && usia <= 6;
        if (filter === "c7") return usia >= 7 && usia <= 12;
        if (filter === "c12") return usia > 12;
        if (filter === "b0") return bayar >= 0 && bayar <= 3;
        if (filter === "b4") return bayar >= 4 && bayar <= 6;
        if (filter === "b7") return bayar >= 7 && bayar <= 12;
        if (filter === "b12") return bayar > 12;
        
        return true;
      }).sort((a, b) => {
        const nA = a.crm ? a.crm.nunggak : 0;
        const nB = b.crm ? b.crm.nunggak : 0;
        if (nA !== nB) return nB - nA;
        
        const urgA = a.status ? a.status.urgent : false;
        const urgB = b.status ? b.status.urgent : false;
        if (urgA !== urgB) return urgA ? -1 : 1;
        
        const tA = a.crm ? a.crm.tglTerbit : 1;
        const tB = b.crm ? b.crm.tglTerbit : 1;
        return tA - tB;
      });
    }, [pelanggan, filter, debouncedSearch]);

    if (!sessionPin) return <LoginScreen onLoginSuccess={(validPin) => setSessionPin(validPin)} />;

    return (
      <div className="app-wrap">
        <div className="top-banner">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: 2, opacity: 0.7, textTransform: "uppercase", fontWeight: 700 }}>Customer Management</div>
              <div style={{ fontSize: 24, fontWeight: 800 }}>MoraBilling <span style={{fontSize:12, fontWeight:500, background:"#DC2626", padding:"2px 6px", borderRadius:4, verticalAlign:"middle"}}>SECURE</span></div>
            </div>
            <button onClick={() => exportToCSV(pelanggan)} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 12, padding: "8px 12px", color: "white", fontSize: 12, fontWeight: 700 }}>Export Semua CSV</button>
          </div>

          <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 16, padding: 15, marginTop: 20 }}>
            <div style={{ fontSize: 12, opacity: 0.8, marginBottom: 8 }}>Status Pelanggan Aktif ({stats.total} ID)</div>
            <div className="stats-row">
              <div style={{ background: "rgba(16, 185, 129, 0.2)", borderRadius: 10, padding: 12, textAlign: "center" }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: "#34D399" }}>{stats.lunas}</div>
                <div style={{ fontSize: 11, opacity: 0.9, marginTop: 4, fontWeight: 600 }}>Lunas Berjalan</div>
              </div>
              <div style={{ background: "rgba(239, 68, 68, 0.2)", borderRadius: 10, padding: 12, textAlign: "center" }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: "#FCA5A5" }}>{stats.belum}</div>
                <div style={{ fontSize: 11, opacity: 0.9, marginTop: 4, fontWeight: 600 }}>Ada Tagihan</div>
              </div>
            </div>
          </div>
        </div>

        <div className="sticky-controls">
          <div style={{ position: "relative" }}>
            <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", fontSize: 16, pointerEvents: "none" }}>🔍</span>
            <input placeholder="Cari nama atau ID..." value={search} onChange={e => setSearch(e.target.value)} style={{ width: "100%", padding: "12px 36px 12px 40px", borderRadius: 12, border: "1px solid #E5E7EB", fontSize: 14, fontWeight: 500, background: "white", color: "#111827", boxSizing: "border-box" }} />
          </div>
          
          <div className="filter-scroll">
            {[['semua', 'Semua Aktif'], ['belum', 'Ada Tagihan'], ['lunas', 'Lunas Semua'], ['putus', 'Putus / Churn']].map(([v, l]) => (
              <button key={v} onClick={() => setFilter(v)} style={{ padding: "8px 14px", borderRadius: 20, border: "1px solid #E5E7EB", fontSize: 12, fontWeight: 700, background: filter === v ? "#111827" : "white", color: filter === v ? "white" : "#6B7280", whiteSpace: "nowrap" }}>{l}</button>
            ))}
          </div>
        </div>

        <div className="customer-grid">
          {loading && pelanggan.length === 0 ? (
            <React.Fragment><SkeletonLoader /><SkeletonLoader /><SkeletonLoader /></React.Fragment>
          ) : 
           filtered.slice(0, visibleCount).map(p => {
            const isPutus = p.statusKlien === "Putus";
            const crm = p.crm || {usia:1, bayar:0, nunggak:0, tglTerbit:1};
            const status = p.status || {label:"Aman", color:"#059669", urgent:false};

            return (
              <div key={p.id} className="card-enter" style={{ background: "white", padding: 20, borderRadius: 20, boxShadow: "0 2px 8px rgba(0,0,0,0.04)", borderLeft: `5px solid ${isPutus ? "#9CA3AF" : (crm.nunggak === 0 ? "#10B981" : (crm.nunggak > 1 ? "#DC2626" : "#D97706"))}`, opacity: isPutus ? 0.6 : 1, filter: isPutus ? "grayscale(100%)" : "none", display: "flex", flexDirection: "column" }}>
                
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
                  <div>
                    <div style={{ display:"flex", gap:6, flexWrap: "wrap", alignItems:"center", marginBottom:8 }}>
                      <span style={{ fontSize: 11, fontWeight: 800, color: "#6D28D9", background: "#EDE9FE", padding: "3px 8px", borderRadius: 6 }}>{p.customerId}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, background: "#F3F4F6", color: "#4B5563", padding: "3px 8px", borderRadius: 6 }}>Pasang: {formatDate(p.joinDate)}</span>
                    </div>
                    <div style={{ fontSize: 18, fontWeight: 800, color: "#111827", textDecoration: isPutus ? "line-through" : "none" }}>{p.nama}</div>
                    <div style={{ fontSize: 13, color: "#6B7280", marginTop: 4, fontWeight: 500 }}>{p.noWa}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 18, fontWeight: 800, color: isPutus ? "#6B7280" : (crm.nunggak === 0 ? "#10B981" : "#111827"), textDecoration: isPutus ? "line-through" : "none" }}>{formatRupiah(p.tagihan)}</div>
                  </div>
                </div>
                
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                   <span style={{ background: "#F3F4F6", color: "#374151", padding: "4px 8px", borderRadius: 6, fontSize: 10, fontWeight: 700 }}>Usia: {crm.usia} Bln</span>
                   <span style={{ background: crm.bayar === 0 ? "#F3F4F6" : "#ECFDF5", color: crm.bayar === 0 ? "#6B7280" : "#059669", padding: "4px 8px", borderRadius: 6, fontSize: 10, fontWeight: 700 }}>Total Bayar: {crm.bayar}x</span>
                   {crm.nunggak > 0 && !isPutus && (
                     <span style={{ background: "#FEF2F2", color: "#DC2626", padding: "4px 8px", borderRadius: 6, fontSize: 10, fontWeight: 800 }}>Tagihan {crm.nunggak} Bln</span>
                   )}
                </div>

                {p.catatan && <div style={{ fontSize: 12, color: "#4B5563", marginTop: 12, padding: "8px 12px", background: "#FFFBEB", borderLeft: "3px solid #D97706", borderRadius: 6, fontWeight: 500 }}>Catatan: {p.catatan}</div>}

                <div style={{ marginTop: "auto" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 16, paddingTop: 16, borderTop: "1px dashed #E5E7EB" }}>
                    <div style={{ fontSize: 11, color: "#6B7280", fontWeight: 500 }}>Terbit Tgl <b style={{color:"#111827"}}>{crm.tglTerbit}</b></div>
                    {!isPutus && crm.nunggak === 0 && <span style={{ background: "#ECFDF5", color: "#059669", padding: "4px 10px", borderRadius: 12, fontSize: 10, fontWeight: 800 }}>Aman</span>}
                  </div>
                  
                  {!isPutus && crm.nunggak > 0 && (
                    <div style={{ fontSize: 12, color: status.color, fontWeight: 800, marginTop: 8, textAlign: "right" }}>{status.label}</div>
                  )}

                  <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
                    {!isPutus && (
                      <React.Fragment>
                        <a href={p.waLink} target="_blank" style={{ flex: 1, background: status.urgent ? "#DC2626" : "#10B981", color: "white", textAlign: "center", padding: "10px", borderRadius: 10, fontSize: 13, fontWeight: 700, textDecoration: "none", display: "flex", alignItems: "center", justifyContent: "center" }}>WA Reminder</a>
                        <div style={{ display: "flex", flex: 1, gap: 6 }}>
                          <button onClick={() => batalBayar(p)} disabled={crm.bayar <= 0} style={{ flex: 0.3, background: crm.bayar <= 0 ? "#F9FAFB" : "#FEF2F2", color: crm.bayar <= 0 ? "#D1D5DB" : "#DC2626", border: crm.bayar <= 0 ? "1px solid #F3F4F6" : "1px solid #FCA5A5", borderRadius: 10, fontSize: 16, fontWeight: 800, cursor: crm.bayar <= 0 ? "not-allowed" : "pointer" }}>-</button>
                          <button onClick={() => catatBayar(p)} disabled={crm.nunggak === 0} style={{ flex: 1, background: crm.nunggak === 0 ? "#E5E7EB" : "#ECFDF5", color: crm.nunggak === 0 ? "#9CA3AF" : "#059669", border: "none", borderRadius: 10, fontSize: 13, fontWeight: 700, cursor: crm.nunggak === 0 ? "not-allowed" : "pointer" }}>{crm.nunggak === 0 ? "✓ Lunas" : "+ Bayar"}</button>
                        </div>
                      </React.Fragment>
                    )}
                    <button onClick={() => { if (typeof vibe !== "undefined") vibe(); setEditItem({...p}); setShowForm(true); }} style={{ flex: isPutus ? 1 : 0.4, padding: "10px", background: "#F3F4F6", border: "1px solid #E5E7EB", borderRadius: 10, fontSize: 13, color: "#374151", fontWeight: 700 }}>Edit</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {visibleCount < filtered.length && !loading && (
          <button className="load-more-btn" onClick={() => setVisibleCount(v => v + ITEM_PER_PAGE)}>Tampilkan Lebih Banyak &darr;</button>
        )}

        <button onClick={() => { if (typeof vibe !== "undefined") vibe(); setEditItem(null); setShowForm(true); }} style={{ position: "fixed", bottom: 24, right: 20, width: 60, height: 60, borderRadius: 30, background: "linear-gradient(135deg, #7C3AED, #4C1D95)", color: "white", border: "none", fontSize: 32, fontWeight: 300, boxShadow: "0 4px 15px rgba(76,29,149,0.4)", zIndex: 50, cursor: "pointer" }}>+</button>

        {showForm && <AddForm initialData={editItem} onSave={handleSave} onDelete={handleDelete} onClose={() => {setEditItem(null); setShowForm(false);}} />}
        
        {toast && (
          <div style={{ position: "fixed", bottom: 40, left: "50%", transform: "translateX(-50%)", background: toast.type === "error" ? "#DC2626" : toast.type === "loading" ? "#4C1D95" : "#111827", color: "white", padding: "12px 24px", borderRadius: 12, fontSize: 13, fontWeight: 700, boxShadow: "0 4px 15px rgba(0,0,0,0.2)", zIndex: 200, display: "flex", alignItems: "center", gap: 10 }}>
            {toast.type === "loading" && <span className="spinner"></span>}
            {toast.msg}
          </div>
        )}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
