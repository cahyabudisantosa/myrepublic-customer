<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MoraBilling Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple: #6D28D9; --font: 'Plus Jakarta Sans', sans-serif; }
    html, body { height: 100%; background: #F3F4F6; font-family: var(--font); color: #111827; }
    #root { height: 100%; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-bg { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .card-enter { animation: fadeIn 0.3s ease forwards; }
    .sheet-enter { animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .skeleton { background: #E5E7EB; border-radius: 8px; animation: pulse-bg 1.5s ease-in-out infinite; }
    button { font-family: var(--font); cursor: pointer; }
    input, select, textarea { outline: none; font-family: var(--font); }
    input:focus, select:focus, textarea:focus { outline: 2px solid #7C3AED; outline-offset: -1px; }
    ::-webkit-scrollbar { display: none; }
    .sticky-top { position: sticky; top: 0; z-index: 40; background: #F3F4F6; padding: 15px 16px 5px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; margin-bottom: 10px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useMemo } = React;

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFbmU1b1aInelEnaWwO8PjaLnUEiy-CAvoN1WoN9GkEFTiYEJ_kam8NVLtD4FKQESwBA/exec";
  const STORAGE_KEY = "morabilling-pro-v18"; // Cache baru
  const PIN_RAHASIA = "1234";
  const HARI_TEMPO = 6;

  const vibe = () => { if (navigator.vibrate) navigator.vibrate(40); };
  const getNow = () => new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" }));
  const formatRupiah = (n) => "Rp " + Number(n || 0).toLocaleString("id-ID");
  const formatNumberInput = (n) => n ? Number(n.toString().replace(/\D/g, "")).toLocaleString('id-ID') : "";
  const cleanPhone = (wa) => { let num = String(wa || "").replace(/\D/g, ""); if (num.startsWith("0")) return "62" + num.substring(1); if (num.startsWith("8")) return "62" + num; return num; };

  const getCurrentBillingCycle = (tanggalTerbit) => {
    const today = getNow();
    const tgl = Number(tanggalTerbit || 1);
    if (today.getDate() >= tgl) return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}`;
    const prev = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    return `${prev.getFullYear()}-${String(prev.getMonth() + 1).padStart(2, "0")}`;
  };

  const isLunas = (p) => p.paidCycle ? String(p.paidCycle).includes(getCurrentBillingCycle(p.tanggalTerbit)) : false;

  const getCycleNumber = (p) => {
    if (!p.joinDate) return null;
    const parts = String(p.joinDate).split("-");
    if (parts.length < 2) return null;
    const startYear = parseInt(parts[0], 10);
    const startMonth = parseInt(parts[1], 10) - 1;
    const today = getNow();
    const monthsDiff = (today.getFullYear() - startYear) * 12 + (today.getMonth() - startMonth);
    return Math.max(1, monthsDiff + 1);
  };

  const getCycleBadgeStyle = (cycle) => {
    if (!cycle) return null;
    if (cycle >= 1 && cycle <= 3) return { bg: "#EFF6FF", color: "#1D4ED8", label: `Siklus ${cycle} (Baru)` };
    if (cycle >= 4 && cycle <= 6) return { bg: "#E6F4EA", color: "#137333", label: `Siklus ${cycle} (Aman)` };
    if (cycle >= 7 && cycle <= 12) return { bg: "#FEF3C7", color: "#B45309", label: `Siklus ${cycle} (Setia)` };
    return { bg: "#F3F4F6", color: "#4B5563", label: `Siklus ${cycle} (VIP)` };
  };
  
  const getDaysUntilTerbit = (t) => {
    const today = getNow();
    today.setHours(0, 0, 0, 0);
    const target = new Date(today.getFullYear(), today.getMonth(), Number(t || 1));
    if (target < today) target.setMonth(target.getMonth() + 1);
    return Math.ceil((target - today) / 86400000);
  };

  const getBillingPhase = (t) => {
    const today = getNow();
    today.setHours(0, 0, 0, 0);
    const tgl = Number(t || 1);
    const terbit = new Date(today.getFullYear(), today.getMonth(), tgl);
    const jatuhTempo = new Date(today.getFullYear(), today.getMonth(), tgl + HARI_TEMPO);
    
    if (today.getTime() === terbit.getTime()) return { phase: "terbit", label: "Terbit Hari Ini", color: "#DC2626", bg: "#FEF2F2", urgent: true };
    if (today > terbit && today < jatuhTempo) return { phase: "aktif", label: `JT ${Math.ceil((jatuhTempo - today) / 86400000)} hari lagi`, color: "#D97706", bg: "#FFFBEB", urgent: false };
    if (today >= jatuhTempo) return { phase: "lewat", label: "Jatuh Tempo!", color: "#DC2626", bg: "#FEF2F2", urgent: true };
    return { phase: "normal", label: `${getDaysUntilTerbit(t)} hari lagi`, color: "#059669", bg: "#ECFDF5", urgent: false };
  };

  const buildWALink = (noWa, nama, t, tagihan, customerId) => {
    const phone = cleanPhone(noWa);
    const bulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"][getNow().getMonth()];
    let jt = Number(t) + HARI_TEMPO;
    jt = jt > 31 ? jt - 30 : jt;
    const msgText = `Halo *Kak ${nama}*\nMau mengingatkan tagihan WiFi MyRepublic bulan ${bulan} sudah terbit\n\nID Pelanggan : *${customerId}*\nTotal : *${formatRupiah(tagihan)}*\nJatuh Tempo : *Tgl ${jt} ${bulan}*\n\nMohon segera melakukan pembayaran sebelum jatuh tempo agar layanan tidak terputus ya Kak\nTerima kasih!`;
    return `https://wa.me/${phone}?text=${encodeURIComponent(msgText)}`;
  };

  const exportToCSV = (data) => {
    const headers = ["ID Pelanggan", "Nama", "No WA", "Tagihan", "Tgl Terbit", "Bulan Join", "Lunas Bulan Ini", "Catatan"];
    const rows = data.map(p => [p.customerId, p.nama, p.noWa, p.tagihan, p.tanggalTerbit, p.joinDate, isLunas(p) ? "Ya" : "Tidak", `"${(p.catatan || "").replace(/"/g, '""')}"`]);
    const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
    const link = document.createElement("a"); link.href = encodeURI(csvContent); link.download = `Data_MoraBilling_${getNow().getTime()}.csv`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  };

  const SkeletonLoader = () => (
    <div style={{ background: "white", padding: 16, borderRadius: 16, marginBottom: 12, display: "flex", gap: 15 }}>
      <div style={{ flex: 1 }}><div className="skeleton" style={{ width: "40%", height: 14, marginBottom: 10 }}></div><div className="skeleton" style={{ width: "80%", height: 20, marginBottom: 10 }}></div><div className="skeleton" style={{ width: "60%", height: 12 }}></div></div>
      <div style={{ width: 80 }}><div className="skeleton" style={{ width: "100%", height: 18, marginBottom: 6 }}></div><div className="skeleton" style={{ width: "100%", height: 24 }}></div></div>
    </div>
  );

  const LoginScreen = ({ onLogin }) => {
    const [pin, setPin] = useState("");
    const [error, setError] = useState(false);
    return (
      <div style={{ height: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "linear-gradient(160deg, #5B21B6, #3B0764)", padding: 20 }}>
        <div style={{ background: "white", padding: 30, borderRadius: 24, width: "100%", maxWidth: 360, textAlign: "center", boxShadow: "0 10px 25px rgba(0,0,0,0.2)" }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>[+]</div>
          <h2 style={{ margin: "0 0 5px", color: "#111827", fontWeight: 800 }}>MoraBilling</h2>
          <p style={{ margin: "0 0 20px", color: "#6B7280", fontSize: 13, fontWeight: 500 }}>Masukkan PIN Billing Anda.</p>
          <input type="password" value={pin} onChange={(e) => {
              vibe(); const num = e.target.value.replace(/\D/g, ""); setPin(num);
              if (num.length === 4) { if (num === PIN_RAHASIA) setTimeout(onLogin, 200); else { setError(true); setTimeout(() => { setError(false); setPin(""); }, 800); } }
            }} placeholder="• • • •" style={{ width: "100%", textAlign: "center", fontSize: 24, letterSpacing: 15, padding: 15, borderRadius: 12, border: error ? "2px solid #DC2626" : "2px solid #E5E7EB", marginBottom: 10, background: error ? "#FEF2F2" : "#F9FAFB", fontWeight: 800, color: error ? "#DC2626" : "#111827" }} maxLength={4} />
          {error && <div style={{color:"#DC2626", fontSize:12, fontWeight:700}}>PIN Salah.</div>}
        </div>
      </div>
    );
  };

  const AddForm = ({ initialData, onSave, onDelete, onClose }) => {
    const [form, setForm] = useState(initialData || { customerId: "", nama: "", noWa: "", tagihan: "", tanggalTerbit: "", startCycle: "", catatan: "" });
    const [tagihanUI, setTagihanUI] = useState(initialData ? formatNumberInput(initialData.tagihan) : "");
    const [errorMsg, setErrorMsg] = useState("");
    const [errorFields, setErrorFields] = useState([]);
    
    const getInputStyle = (field) => ({ width: "100%", border: errorFields.includes(field) ? "2px solid #DC2626" : "1.5px solid #E5E7EB", borderRadius: 10, padding: "11px 14px", fontSize: 14, background: errorFields.includes(field) ? "#FEF2F2" : "#F9FAFB", marginBottom: 12, fontWeight: 500, color: "#111827", boxSizing: "border-box" });
    const labelStyle = { fontSize: 12, fontWeight: 700, color: "#6B7280", display: "block", marginBottom: 6 };

    function handleSave() {
      vibe();
      let errs = [];
      if (!form.customerId.trim()) errs.push("customerId");
      if (!form.nama.trim()) errs.push("nama");
      if (!form.noWa.trim()) errs.push("noWa");
      if (!form.tagihan) errs.push("tagihan");
      if (!form.tanggalTerbit) errs.push("tanggalTerbit");
      if (!form.startCycle) errs.push("startCycle");

      if (errs.length > 0) {
        setErrorFields(errs);
        setErrorMsg("Mohon lengkapi semua kotak merah.");
        return;
      }
      onSave({...form});
    }

    return (
      <div style={{ padding: "0 20px 24px", background: "white", borderRadius: "24px 24px 0 0" }}>
        <div style={{ display: "flex", justifyContent: "center", padding: "12px 0 16px" }}><div style={{ width: 40, height: 5, background: "#E5E7EB", borderRadius: 3 }}></div></div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800 }}>{initialData ? "Edit Pelanggan" : "Pelanggan Baru"}</h3>
          <button onClick={()=>{vibe(); onClose();}} style={{ background: "#F3F4F6", border: "none", borderRadius: 10, width: 36, height: 36, fontSize: 14, fontWeight: 700, color: "#6B7280" }}>X</button>
        </div>

        <label style={labelStyle}>ID Pelanggan *</label>
        <input style={{...getInputStyle("customerId"), border: errorFields.includes("customerId") ? "2px solid #DC2626" : "2px solid #DDD6FE", background: errorFields.includes("customerId") ? "#FEF2F2" : "white", fontWeight: 700}} placeholder="MR-0001" value={form.customerId} onChange={e => setForm({...form, customerId: e.target.value.toUpperCase()})} />
        
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div><label style={labelStyle}>Nama *</label><input style={getInputStyle("nama")} placeholder="Budi S." value={form.nama} onChange={e => setForm({...form, nama: e.target.value})} /></div>
          <div><label style={labelStyle}>No. WA *</label><input style={getInputStyle("noWa")} type="tel" placeholder="0812..." value={form.noWa} onChange={e => setForm({...form, noWa: e.target.value.replace(/\D/g, "")})} /></div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div style={{ gridColumn: "1 / -1" }}>
            <label style={labelStyle}>Nominal Tagihan (Rp) *</label>
            <input style={{...getInputStyle("tagihan"), fontWeight:700}} type="tel" placeholder="277.500" value={tagihanUI} onChange={e => {
              const val = e.target.value; setTagihanUI(formatNumberInput(val)); setForm({...form, tagihan: val.replace(/\D/g, "")});
            }} />
          </div>
        </div>
        
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div><label style={labelStyle}>Tgl Terbit *</label><select style={getInputStyle("tanggalTerbit")} value={form.tanggalTerbit} onChange={e => setForm({...form, tanggalTerbit: e.target.value})}><option value="">Pilih...</option>{Array.from({length: 31}, (_, i) => <option key={i+1} value={i+1}>Tgl {i+1}</option>)}</select></div>
          <div><label style={labelStyle}>Bulan Pasang *</label><input style={getInputStyle("startCycle")} type="month" value={form.startCycle} onChange={e => setForm({...form, startCycle: e.target.value})} /></div>
        </div>

        <label style={labelStyle}>Catatan / Keterangan</label>
        <textarea style={{...getInputStyle("catatan"), height: 70, resize: "none"}} placeholder="Contoh: Janji bayar tgl 15..." value={form.catatan} onChange={e => setForm({...form, catatan: e.target.value})} />

        {errorMsg && <div style={{ color: "#DC2626", fontSize: 13, marginBottom: 12, fontWeight: 600, background: "#FEF2F2", padding: "10px", borderRadius: "8px" }}>{errorMsg}</div>}
        
        <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
          {initialData && <button onClick={() => { vibe(); onDelete(initialData.id); }} style={{ padding: "14px 20px", background: "#FEF2F2", color: "#DC2626", border: "none", borderRadius: 12, fontSize: 15, fontWeight: 700 }}>Hapus</button>}
          <button onClick={handleSave} style={{ flex: 1, background: "linear-gradient(135deg, #7C3AED, #4C1D95)", color: "white", border: "none", borderRadius: 12, padding: "14px", fontSize: 15, fontWeight: 700 }}>Simpan Data</button>
        </div>
      </div>
    );
  };

  const App = () => {
    const [isLoggedIn, setIsLoggedIn] = useState(false);
    const [pelanggan, setPelanggan] = useState([]);
    const [loading, setLoading] = useState(true);
    const [filter, setFilter] = useState("semua");
    const [search, setSearch] = useState("");
    const [showForm, setShowForm] = useState(false);
    const [editItem, setEditItem] = useState(null);
    const [toast, setToast] = useState(null);
    const [isOnline, setIsOnline] = useState(navigator.onLine);

    useEffect(() => {
      const handleOnline = () => setIsOnline(true);
      const handleOffline = () => setIsOnline(false);
      window.addEventListener('online', handleOnline);
      window.addEventListener('offline', handleOffline);
      return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
    }, []);

    useEffect(() => {
      if (!isLoggedIn) return;
      try { const cached = localStorage.getItem(STORAGE_KEY); if (cached) setPelanggan(JSON.parse(cached)); } catch (e) {}
      fetchData();
    }, [isLoggedIn]);

    const fetchData = () => {
      if (!navigator.onLine) { showMsg("Offline. Menampilkan data lokal.", "error"); setLoading(false); return; }
      setLoading(true);
      fetch(SCRIPT_URL + "?action=getAll").then(res => res.json()).then(json => {
        if (json.success) { setPelanggan(json.data); localStorage.setItem(STORAGE_KEY, JSON.stringify(json.data)); }
        setLoading(false);
      }).catch(() => { showMsg("Gagal sinkron. Cek koneksi.", "error"); setLoading(false); });
    };

    const showMsg = (msg, type="success") => { setToast({msg, type}); if(type !== "loading") setTimeout(() => setToast(null), 2500); };

    const handleAPI = (updatedData, successMsg) => {
      showMsg("Menyimpan ke server...", "loading");
      fetch(SCRIPT_URL + "?action=save", { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(updatedData) })
        .then(res => res.json())
        .then(json => {
          if(json.success) { showMsg(successMsg); localStorage.setItem(STORAGE_KEY, JSON.stringify(updatedData)); }
          else showMsg("Error Server: " + json.error, "error");
        }).catch(() => showMsg("Gagal menghubungi server.", "error"));
    };

    const handleSave = (data) => {
      if (!navigator.onLine) { showMsg("Gagal. Koneksi Offline!", "error"); return; }
      
      let finalJoinDate = data.startCycle || "";
      if (finalJoinDate && finalJoinDate.length === 7) { finalJoinDate += "-01"; }
      
      const dataToSave = { ...data, joinDate: finalJoinDate };
      const isEdit = !!data.id;
      const updated = isEdit ? pelanggan.map(p => p.id === dataToSave.id ? dataToSave : p) : [...pelanggan, { ...dataToSave, id: String(Date.now()), paidCycle: null }];
      
      setPelanggan(updated); setShowForm(false); setEditItem(null);
      handleAPI(updated, "Berhasil disimpan!");
    };

    const toggleLunas = (p) => {
      vibe();
      if (!navigator.onLine) { showMsg("Gagal. Koneksi Offline!", "error"); return; }
      const cycle = getCurrentBillingCycle(p.tanggalTerbit);
      const paid = isLunas(p);
      const updated = pelanggan.map(x => x.id === p.id ? { ...x, paidCycle: paid ? null : cycle } : x);
      setPelanggan(updated);
      handleAPI(updated, paid ? "Status Lunas Dibatalkan" : "Pembayaran Berhasil!");
    };

    const handleDelete = (id) => {
      if (!navigator.onLine) { showMsg("Gagal hapus. Koneksi Offline!", "error"); return; }
      if(!window.confirm("Hapus data ini permanen?")) return;
      const updated = pelanggan.filter(x => x.id !== id);
      setPelanggan(updated); setShowForm(false);
      handleAPI(updated, "Data Terhapus");
    };

    const stats = useMemo(() => {
      let lunasCount = 0, belumCount = 0;
      pelanggan.forEach(p => { 
        if (isLunas(p)) lunasCount++; else belumCount++; 
      });
      return { lunas: lunasCount, belum: belumCount, total: pelanggan.length };
    }, [pelanggan]);

    const filtered = useMemo(() => {
      return pelanggan.filter(p => {
        const m = (p.nama||"").toLowerCase().includes(search.toLowerCase()) || (p.customerId||"").toLowerCase().includes(search.toLowerCase());
        if (!m) return false;

        if (filter === "lunas") return isLunas(p);
        if (filter === "belum") return !isLunas(p);
        
        const cycle = getCycleNumber(p);
        if (filter === "c1") return cycle >= 1 && cycle <= 3;
        if (filter === "c4") return cycle >= 4 && cycle <= 6;
        if (filter === "c7") return cycle >= 7 && cycle <= 12;
        if (filter === "c12") return cycle > 12;
        
        return true;
      }).sort((a, b) => {
        const aU = !isLunas(a) && ["terbit", "aktif", "lewat"].includes(getBillingPhase(a.tanggalTerbit).phase);
        const bU = !isLunas(b) && ["terbit", "aktif", "lewat"].includes(getBillingPhase(b.tanggalTerbit).phase);
        return aU !== bU ? (aU ? -1 : 1) : getDaysUntilTerbit(a.tanggalTerbit) - getDaysUntilTerbit(b.tanggalTerbit);
      });
    }, [pelanggan, filter, search]);

    if (!isLoggedIn) return <LoginScreen onLogin={() => setIsLoggedIn(true)} />;

    return (
      <div style={{ maxWidth: 480, margin: "0 auto", paddingBottom: 100 }}>
        <div style={{ background: "linear-gradient(160deg, #5B21B6, #4C1D95)", padding: "24px 20px 30px", color: "white", borderBottomLeftRadius: 24, borderBottomRightRadius: 24, boxShadow: "0 4px 15px rgba(0,0,0,0.1)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: 2, opacity: 0.7, textTransform: "uppercase", fontWeight: 700 }}>Dashboard Billing</div>
              <div style={{ fontSize: 24, fontWeight: 800 }}>MoraRepublic</div>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              {!isOnline && <div style={{ background: "#DC2626", color: "white", padding: "6px 10px", borderRadius: 10, fontSize: 11, fontWeight: 700, display: "flex", alignItems: "center" }}>Offline</div>}
              <button onClick={() => {vibe(); exportToCSV(filtered);}} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 12, padding: "8px 12px", color: "white", fontSize: 12, fontWeight: 700 }}>Export CSV</button>
            </div>
          </div>

          <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 16, padding: 15 }}>
            <div style={{ fontSize: 12, opacity: 0.8, marginBottom: 15 }}>Ringkasan Klien ({stats.total} ID)</div>
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1, background: "rgba(16, 185, 129, 0.2)", borderRadius: 10, padding: 12, textAlign: "center" }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: "#34D399" }}>{stats.lunas}</div>
                <div style={{ fontSize: 11, opacity: 0.9, marginTop: 4, fontWeight: 600 }}>Lunas</div>
              </div>
              <div style={{ flex: 1, background: "rgba(239, 68, 68, 0.2)", borderRadius: 10, padding: 12, textAlign: "center" }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: "#FCA5A5" }}>{stats.belum}</div>
                <div style={{ fontSize: 11, opacity: 0.9, marginTop: 4, fontWeight: 600 }}>Menunggak</div>
              </div>
            </div>
          </div>
        </div>

        <div className="sticky-top">
          <div style={{ position: "relative", marginBottom: 12 }}>
            <input placeholder="Cari nama atau ID pelanggan..." value={search} onChange={e => setSearch(e.target.value)} style={{ width: "100%", padding: "12px 36px 12px 16px", borderRadius: 12, border: "1px solid #E5E7EB", fontSize: 14, fontWeight: 500, background: "white", color: "#111827", boxSizing: "border-box" }} />
            {search && <button onClick={() => {vibe(); setSearch("");}} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", width: 24, height: 24, borderRadius: "50%", background: "#F3F4F6", color: "#6B7280", border: "none", fontSize: 12, fontWeight: "bold", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 5, width: "100%" }}>
              {[
                ['semua', 'Semua'], ['belum', 'Belum Bayar'], ['lunas', 'Lunas'],
                ['c1', 'Siklus 1-3'], ['c4', 'Siklus 4-6'], ['c7', 'Siklus 7-12'], ['c12', 'Siklus 12+']
              ].map(([v, l]) => (
                <button key={v} onClick={() => {vibe(); setFilter(v);}} style={{ padding: "6px 14px", borderRadius: 20, border: "1px solid #E5E7EB", fontSize: 12, fontWeight: 700, background: filter === v ? "#111827" : "white", color: filter === v ? "white" : "#6B7280", whiteSpace: "nowrap", transition: "0.2s" }}>{l}</button>
              ))}
            </div>
          </div>
        </div>

        <div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 12 }}>
          {loading && pelanggan.length === 0 ? (
            <React.Fragment><SkeletonLoader /><SkeletonLoader /><SkeletonLoader /></React.Fragment>
          ) : 
           filtered.length === 0 ? (
            <div style={{ background: "white", borderRadius: 16, padding: "40px 20px", textAlign: "center", border: "1px dashed #D1D5DB" }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>{filter === "belum" && pelanggan.filter(p => !isLunas(p)).length === 0 ? "🎉" : "🔍"}</div>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#111827", marginBottom: 6 }}>{filter === "belum" && pelanggan.filter(p => !isLunas(p)).length === 0 ? "Semua Tagihan Lunas!" : "Data tidak ditemukan"}</div>
              <div style={{ fontSize: 13, color: "#6B7280", fontWeight: 500 }}>{filter === "belum" && pelanggan.filter(p => !isLunas(p)).length === 0 ? "Kerja bagus! Tidak ada klien yang menunggak." : "Coba filter atau kata kunci lain."}</div>
            </div>
           ) :
           filtered.map(p => {
            const lunasStatus = isLunas(p);
            const status = getBillingPhase(p.tanggalTerbit);
            const cycleNum = getCycleNumber(p);
            const cycleBadge = getCycleBadgeStyle(cycleNum);

            return (
              <div key={p.id} className="card-enter" style={{ background: "white", padding: 16, borderRadius: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.04)", borderLeft: `5px solid ${lunasStatus ? "#10B981" : status.color}`, opacity: lunasStatus ? 0.75 : 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <div>
                    <div style={{ display:"flex", gap:6, flexWrap: "wrap", alignItems:"center", marginBottom:6 }}>
                      <span style={{ fontSize: 11, fontWeight: 800, color: "#6D28D9", background: "#EDE9FE", padding: "2px 8px", borderRadius: 6 }}>{p.customerId}</span>
                      {cycleBadge && (
                        <span style={{ fontSize: 10, fontWeight: 800, background: cycleBadge.bg, color: cycleBadge.color, padding: "2px 8px", borderRadius: 6, letterSpacing: "0.2px" }}>
                          {cycleBadge.label}
                        </span>
                      )}
                    </div>
                    <div style={{ fontSize: 16, fontWeight: 800, color: "#111827" }}>{p.nama}</div>
                    <div style={{ fontSize: 12, color: "#6B7280", marginTop: 2, fontWeight: 500 }}>{p.noWa}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 17, fontWeight: 800, color: lunasStatus ? "#10B981" : "#111827" }}>{formatRupiah(p.tagihan)}</div>
                  </div>
                </div>
                
                {p.catatan && <div style={{ fontSize: 11, color: "#4B5563", marginTop: 10, padding: "8px 12px", background: "#FFFBEB", borderLeft: "2px solid #D97706", borderRadius: 4, fontWeight: 500 }}>Catatan: {p.catatan}</div>}

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12, paddingTop: 12, borderTop: "1px dashed #E5E7EB" }}>
                  <div style={{ fontSize: 11, color: "#6B7280", fontWeight: 500 }}>Terbit <b style={{color:"#111827"}}>{p.tanggalTerbit}</b> → JT <b style={{color:"#111827"}}>{Number(p.tanggalTerbit) + HARI_TEMPO > 31 ? Number(p.tanggalTerbit) + HARI_TEMPO - 30 : Number(p.tanggalTerbit) + HARI_TEMPO}</b></div>
                  {!lunasStatus && <span style={{ background: status.bg, color: status.color, padding: "4px 10px", borderRadius: 12, fontSize: 10, fontWeight: 800 }}>{status.label}</span>}
                </div>

                <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                  <a onClick={()=>vibe()} href={buildWALink(p.noWa, p.nama, p.tanggalTerbit, p.tagihan, p.customerId)} target="_blank" style={{ flex: 1, background: status.urgent && !lunasStatus ? "#DC2626" : "#10B981", color: "white", textAlign: "center", padding: "10px", borderRadius: 10, fontSize: 13, fontWeight: 700, textDecoration: "none", display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>WA Reminder</a>
                  <button onClick={() => toggleLunas(p)} style={{ flex: 1, background: lunasStatus ? "#FEF2F2" : "#ECFDF5", color: lunasStatus ? "#DC2626" : "#059669", border: "none", borderRadius: 10, fontSize: 13, fontWeight: 700 }}>{lunasStatus ? "Batal Lunas" : "✔ Lunas"}</button>
                  <button onClick={() => { 
                    vibe(); 
                    let safeCycle = "";
                    if (p.joinDate && typeof p.joinDate === 'string' && p.joinDate.length >= 7) {
                      safeCycle = p.joinDate.substring(0, 7);
                    }
                    setEditItem({...p, startCycle: safeCycle}); 
                    setShowForm(true); 
                  }} style={{ padding: "0 16px", background: "#F3F4F6", border: "1px solid #E5E7EB", borderRadius: 10, fontSize: 13, color: "#374151", fontWeight: 700 }}>Edit</button>
                </div>
              </div>
            );
          })}
        </div>

        <button onClick={() => { vibe(); setEditItem(null); setShowForm(true); }} style={{ position: "fixed", bottom: 24, right: 20, width: 60, height: 60, borderRadius: 30, background: "linear-gradient(135deg, #7C3AED, #4C1D95)", color: "white", border: "none", fontSize: 32, fontWeight: 300, boxShadow: "0 4px 15px rgba(76,29,149,0.4)", zIndex: 50 }}>+</button>

        {showForm && (
          <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end" }}>
            <div className="sheet-enter" style={{ background: "white", width: "100%", borderTopLeftRadius: 24, borderTopRightRadius: 24, maxHeight: "90vh", overflowY: "auto", paddingBottom: "env(safe-area-inset-bottom, 20px)" }}>
              <AddForm initialData={editItem} onSave={handleSave} onDelete={handleDelete} onClose={() => setShowForm(false)} />
            </div>
          </div>
        )}
        
        {toast && (
          <div style={{ position: "fixed", bottom: 100, left: "50%", transform: "translateX(-50%)", background: toast.type === "error" ? "#DC2626" : toast.type === "loading" ? "#4C1D95" : "#111827", color: "white", padding: "12px 24px", borderRadius: 12, fontSize: 13, fontWeight: 700, boxShadow: "0 4px 15px rgba(0,0,0,0.2)", zIndex: 200, display: "flex", alignItems: "center", gap: 10 }}>
            {toast.type === "loading" && <span className="spinner"></span>}
            {toast.msg}
          </div>
        )}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
