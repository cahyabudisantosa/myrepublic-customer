  <title>MoraRepublic CMS Pro</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-color: #F3F4F6;
      --text-main: #111827;
      --text-muted: #6B7280;
      --card-bg: #FFFFFF;
      --purple: #6D28D9;
      --purple-dark: #4C1D95;
      --green: #10B981;
      --red: #DC2626;
      --border: #E5E7EB;
      --font: 'Plus Jakarta Sans', sans-serif;
    }
    
    /* Dark Mode Theme */
    [data-theme="dark"] {
      --bg-color: #111827;
      --text-main: #F9FAFB;
      --text-muted: #9CA3AF;
      --card-bg: #1F2937;
      --border: #374151;
    }
    
    html, body { height: 100%; background: var(--bg-color); font-family: var(--font); color: var(--text-main); transition: background 0.3s; }
    #root { height: 100%; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .card-enter { animation: fadeIn 0.3s ease forwards; }
    .sheet-enter { animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
    
    button { font-family: var(--font); cursor: pointer; }
    input, select, textarea { 
      outline: none; font-family: var(--font); background: var(--bg-color); 
      color: var(--text-main); border: 1.5px solid var(--border); 
    }
    input:focus, select:focus, textarea:focus { outline: 2px solid var(--purple); outline-offset: -1px; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
