<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#4C1D95"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>MoraBilling Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple: #6D28D9; --font: 'Plus Jakarta Sans', sans-serif; }
    html, body { height: 100%; background: #F3F4F6; font-family: var(--font); color: #111827; }
    #root { height: 100%; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse-bg { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* padding-bottom 140px = 80 normal + 60 bottom-nav */
    .app-wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding-bottom: 140px; }
    .top-banner { background: linear-gradient(160deg, #5B21B6, #4C1D95); padding: 24px 20px 30px; color: white; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .sticky-controls { position: sticky; top: 0; z-index: 40; background: #F3F4F6; padding: 15px 16px 5px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; margin-bottom: 16px; display: grid; gap: 10px; }
    .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; width: 100%; }
    .dropdown-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-bottom: 4px; }
    .customer-grid { display: grid; grid-template-columns: 1fr; gap: 16px; padding: 0 16px; align-items: stretch; }
    .load-more-btn { margin: 20px 16px; padding: 14px; background: white; border: 1px dashed #D1D5DB; border-radius: 16px; color: #4B5563; font-weight: 700; text-align: center; cursor: pointer; display: block; width: calc(100% - 32px); box-sizing: border-box; }
    .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); display: flex; align-items: flex-end; justify-content: center; }
    .modal-content { background: white; width: 100%; border-top-left-radius: 24px; border-top-right-radius: 24px; max-height: 90vh; overflow-y: auto; padding: 20px; animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1) forwards; }

    /* ✅ NEW: Bottom Navigation */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #E5E7EB; display: flex; z-index: 60; height: 64px; }
    .bottom-nav button { flex: 1; border: none; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; font-family: var(--font); }
    .bottom-nav button:active { background: #F9FAFB; }

    @media (min-width: 640px) {
      .top-banner { border-radius: 24px; margin-top: 20px; padding: 30px; }
      .stats-row { grid-template-columns: repeat(2, 220px); justify-content: flex-start; }
      .sticky-controls { grid-template-columns: 2fr 3fr; padding: 20px; border-radius: 16px; margin: 20px 16px; align-items: center; }
      .dropdown-row { grid-column: 1 / -1; grid-template-columns: 1fr 1fr; max-width: 400px; }
      .customer-grid { grid-template-columns: repeat(2, 1fr); padding: 0 20px; }
      .load-more-btn { width: calc(100% - 40px); margin: 20px auto; max-width: 400px; }
      .modal-overlay { align-items: center; padding: 20px; }
      .modal-content { max-width: 500px; border-radius: 24px; animation: fadeIn 0.3s ease forwards; }
    }
    @media (min-width: 1024px) {
      .customer-grid { grid-template-columns: repeat(3, 1fr); }
      .sticky-controls { grid-template-columns: 2fr 3fr 2fr; }
      .dropdown-row { grid-column: auto; max-width: none; }
    }

    .card-enter { animation: fadeIn 0.3s ease forwards; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .skeleton { background: #E5E7EB; border-radius: 8px; animation: pulse-bg 1.5s ease-in-out infinite; }
    button { font-family: var(--font); cursor: pointer; transition: transform 0.1s; }
    button:active { transform: scale(0.97); }
    input, select, textarea { outline: none; font-family: var(--font); }
    input:focus, select:focus, textarea:focus { outline: 2px solid #7C3AED; outline-offset: -1px; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useMemo } = React;

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeET2jzr_JtNvRsWFbYGIjRkc3cVBXetHR7hXxO-pZugkSPcGDEPzrLrz1wH01gN51ww/exec";
  const STORAGE_KEY = "morabilling-pro-smart-backend";
  const ITEM_PER_PAGE = 20;

  // ✅ NEW: Keuangan constants
  const KATEGORI_PEMASUKAN = ['Gaji Pokok', 'Insentif/Komisi', 'Upres', 'Belt', 'Lain-lain'];
  const KATEGORI_PENGELUARAN = ['Agen', 'Teknisi', 'Cashback', 'Lain-lain'];
  const BULAN_NAMES = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const BULAN_SHORT = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];

  // --- UTILITY (UNCHANGED) ---
  const formatRupiah = (n) => "Rp " + Number(n || 0).toLocaleString("id-ID");
  const formatNumberInput = (n) => n ? Number(n.toString().replace(/\D/g, "")).toLocaleString('id-ID') : "";
  const formatDate = (dateStr) => {
    if (!dateStr) return "-";
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    const m = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
  };
  const exportToCSV = (data) => {
    const headers = ["ID Pelanggan","Nama","No WA","Tagihan Bulanan","Tanggal Pasang","Usia Berlangganan (Bulan)","Total Bayar (Bulan)","Tagihan (Bulan)","Status Pelanggan","Catatan"];
    const rows = data.map(p => [p.customerId, p.nama, p.noWa, p.tagihan, p.joinDate, p.crm.usia, p.crm.bayar, p.crm.nunggak, p.statusKlien, `"${(p.catatan||"").replace(/"/g,'""')}"`]);
    const csv = "data:text/csv;charset=utf-8," + [headers.join(",")].concat(rows.map(e => e.join(","))).join("\n");
    const link = document.createElement("a"); link.href = encodeURI(csv); link.download = "MoraBilling_Export.csv";
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  };

  // ✅ NEW: Export Keuangan CSV
  const exportKeuanganCSV = (data, bulan, tahun) => {
    const headers = ["Tanggal","Tipe","Kategori","ID Pelanggan","Nominal","Keterangan"];
    const rows = data.map(k => [k.tanggal, k.tipe, k.kategori, k.idPelanggan||"", k.nominal, `"${(k.keterangan||"").replace(/"/g,'""')}"`]);
    const csv = "data:text/csv;charset=utf-8,\uFEFF" + [headers.join(",")].concat(rows.map(r=>r.join(","))).join("\n");
    const link = document.createElement("a");
    link.href = encodeURI(csv);
    link.download = `Keuangan_${BULAN_SHORT[bulan]}${tahun}.csv`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  };

  // --- SKELETON (UNCHANGED) ---
  const SkeletonLoader = () => (
    <div style={{ background: "white", padding: 20, borderRadius: 20, boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
        <div><div className="skeleton" style={{ width: 80, height: 20, marginBottom: 8 }}></div><div className="skeleton" style={{ width: 140, height: 24, marginBottom: 8 }}></div><div className="skeleton" style={{ width: 100, height: 16 }}></div></div>
        <div className="skeleton" style={{ width: 60, height: 28, borderRadius: 8 }}></div>
      </div>
      <div style={{ display: "flex", gap: 6 }}><div className="skeleton" style={{ width: 70, height: 24, borderRadius: 6 }}></div><div className="skeleton" style={{ width: 90, height: 24, borderRadius: 6 }}></div></div>
    </div>
  );

  // --- LOGIN (UNCHANGED) ---
  const LoginScreen = ({ onLoginSuccess }) => {
    const [pin, setPin] = useState(""); const [err, setErr] = useState("");
    const handleLogin = async () => {
      if (!pin) { setErr("Masukkan PIN dulu."); return; }
      setErr("Memverifikasi...");
      try {
        const res = await fetch(`${SCRIPT_URL}?action=login&pin=${pin}`);
        const json = await res.json();
        if (json.success && json.authenticated) { onLoginSuccess(pin); }
        else { setErr("PIN Salah! Coba lagi."); setPin(""); }
      } catch (e) { setErr("Gagal konek server."); }
    };
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", background:"linear-gradient(160deg,#5B21B6,#4C1D95)", padding:20 }}>
        <div style={{ width:"100%", maxWidth:360, background:"white", borderRadius:24, padding:32, boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
          <div style={{ textAlign:"center", marginBottom:28 }}>
            <div style={{ fontSize:40, marginBottom:8 }}>🔐</div>
            <div style={{ fontSize:24, fontWeight:800 }}>MoraBilling</div>
            <div style={{ fontSize:13, color:"#6B7280", marginTop:4 }}>Masukkan PIN untuk melanjutkan</div>
          </div>
          <input type="password" inputMode="numeric" maxLength={8} value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="PIN Rahasia" style={{ width:"100%", padding:"14px 16px", borderRadius:12, border:"1.5px solid #E5E7EB", fontSize:18, textAlign:"center", letterSpacing:6, fontWeight:700, marginBottom:12, color:"#111827" }}/>
          {err && <div style={{ fontSize:13, color: err==="Memverifikasi..."?"#6D28D9":"#DC2626", textAlign:"center", marginBottom:12, fontWeight:600 }}>{err}</div>}
          <button onClick={handleLogin} style={{ width:"100%", padding:16, background:"linear-gradient(135deg,#7C3AED,#4C1D95)", color:"white", border:"none", borderRadius:12, fontSize:16, fontWeight:800 }}>Masuk</button>
        </div>
      </div>
    );
  };

  // --- ADD FORM (UNCHANGED) ---
  const AddForm = ({ initialData, onSave, onDelete, onClose }) => {
    const [form, setForm] = useState(initialData || { customerId:"", nama:"", noWa:"", tagihan:"", joinDate:"", statusKlien:"Aktif", catatan:"" });
    const [tagihanUI, setTagihanUI] = useState(initialData ? formatNumberInput(initialData.tagihan) : "");
    const [errorMsg, setErrorMsg] = useState(""); const [errorFields, setErrorFields] = useState([]);
    const getInputStyle = (field) => ({ width:"100%", border: errorFields.includes(field)?"2px solid #DC2626":"1.5px solid #E5E7EB", borderRadius:10, padding:"11px 14px", fontSize:14, background: errorFields.includes(field)?"#FEF2F2":"#F9FAFB", marginBottom:12, fontWeight:500, color:"#111827", boxSizing:"border-box" });
    const labelStyle = { fontSize:12, fontWeight:700, color:"#6B7280", display:"block", marginBottom:6 };
    const handleSave = () => {
      let errs = [];
      if (!form.customerId) errs.push("customerId"); if (!form.nama) errs.push("nama"); if (!form.tagihan) errs.push("tagihan"); if (!form.joinDate) errs.push("joinDate");
      if (errs.length > 0) { setErrorFields(errs); setErrorMsg("Mohon lengkapi field yang ditandai merah."); return; }
      onSave({ ...form, tagihan: String(form.tagihan).replace(/\D/g, "") });
    };
    return (
      <div className="modal-overlay" onClick={e => { if (e.target===e.currentTarget) onClose(); }}>
        <div className="modal-content">
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <h3 style={{ margin:0, fontSize:18, fontWeight:800 }}>{initialData ? "Edit Pelanggan" : "Pelanggan Baru"}</h3>
            <button onClick={onClose} style={{ background:"#F3F4F6", border:"none", borderRadius:10, width:36, height:36, fontSize:14, fontWeight:700, color:"#6B7280" }}>✕</button>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div><label style={labelStyle}>ID Pelanggan *</label><input style={getInputStyle("customerId")} placeholder="MR-0001" value={form.customerId} onChange={e=>setForm({...form,customerId:e.target.value.toUpperCase()})}/></div>
            <div><label style={labelStyle}>Nama *</label><input style={getInputStyle("nama")} placeholder="Nama lengkap" value={form.nama} onChange={e=>setForm({...form,nama:e.target.value})}/></div>
          </div>
          <label style={labelStyle}>No. WhatsApp</label>
          <input style={getInputStyle("noWa")} type="tel" placeholder="08xx" value={form.noWa} onChange={e=>setForm({...form,noWa:e.target.value})}/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div><label style={labelStyle}>Tagihan/Bulan *</label><input type="tel" style={getInputStyle("tagihan")} placeholder="0" value={tagihanUI} onChange={e=>{setTagihanUI(formatNumberInput(e.target.value));setForm({...form,tagihan:e.target.value.replace(/\D/g,"")});}}/></div>
            <div><label style={labelStyle}>Status</label><select style={{...getInputStyle("statusKlien"),color:"#111827"}} value={form.statusKlien} onChange={e=>setForm({...form,statusKlien:e.target.value})}><option>Aktif</option><option>Putus</option></select></div>
          </div>
          <label style={labelStyle}>Tanggal Pasang *</label>
          <input type="date" style={getInputStyle("joinDate")} value={form.joinDate} onChange={e=>setForm({...form,joinDate:e.target.value})}/>
          <label style={labelStyle}>Catatan</label>
          <textarea style={{...getInputStyle("catatan"),height:60,resize:"none"}} placeholder="Catatan tambahan..." value={form.catatan} onChange={e=>setForm({...form,catatan:e.target.value})}/>
          {errorMsg && <div style={{ color:"#DC2626", fontSize:13, marginBottom:12, fontWeight:600, background:"#FEF2F2", padding:10, borderRadius:8 }}>{errorMsg}</div>}
          <div style={{ display:"flex", gap:10, marginTop:10 }}>
            {initialData && <button onClick={()=>onDelete(initialData)} style={{ padding:"14px 20px", background:"#FEF2F2", color:"#DC2626", border:"none", borderRadius:12, fontSize:15, fontWeight:700 }}>Hapus</button>}
            <button onClick={handleSave} style={{ flex:1, background:"linear-gradient(135deg,#7C3AED,#4C1D95)", color:"white", border:"none", borderRadius:12, padding:14, fontSize:15, fontWeight:700 }}>Simpan</button>
          </div>
        </div>
      </div>
    );
  };

  // ✅ NEW: KeuanganCard
  const KeuanganCard = ({ item, onEdit }) => {
    const isIn = item.tipe === 'Pemasukan';
    return (
      <div className="card-enter" style={{ background:"white", padding:20, borderRadius:20, boxShadow:"0 2px 8px rgba(0,0,0,0.04)", borderLeft:`5px solid ${isIn?"#10B981":"#DC2626"}`, display:"flex", flexDirection:"column" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
          <div style={{ flex:1 }}>
            <span style={{ fontSize:11, fontWeight:800, color:isIn?"#059669":"#DC2626", background:isIn?"#ECFDF5":"#FEF2F2", padding:"3px 8px", borderRadius:6 }}>
              {isIn ? "↑" : "↓"} {item.tipe}
            </span>
            <div style={{ fontSize:16, fontWeight:800, color:"#111827", marginTop:8 }}>{item.kategori}</div>
            {item.idPelanggan && <span style={{ fontSize:11, fontWeight:700, color:"#6D28D9", background:"#EDE9FE", padding:"2px 7px", borderRadius:5, marginTop:4, display:"inline-block" }}>{item.idPelanggan}</span>}
          </div>
          <div style={{ textAlign:"right", flexShrink:0, paddingLeft:12 }}>
            <div style={{ fontSize:11, color:"#9CA3AF", fontWeight:600, marginBottom:4 }}>{formatDate(item.tanggal)}</div>
            <div style={{ fontSize:20, fontWeight:800, color:isIn?"#10B981":"#DC2626" }}>{formatRupiah(item.nominal)}</div>
          </div>
        </div>
        {item.keterangan && <div style={{ fontSize:12, color:"#4B5563", padding:"8px 12px", background:"#F9FAFB", borderRadius:8, marginTop:4 }}>{item.keterangan}</div>}
        <div style={{ paddingTop:14, borderTop:"1px dashed #E5E7EB", marginTop:14 }}>
          <button onClick={()=>onEdit(item)} style={{ width:"100%", padding:10, background:"#F3F4F6", border:"1px solid #E5E7EB", borderRadius:10, fontSize:13, color:"#374151", fontWeight:700 }}>Edit</button>
        </div>
      </div>
    );
  };

  // ✅ NEW: KeuanganForm
  const KeuanganForm = ({ initialData, onSave, onDelete, onClose }) => {
    const todayStr = new Date().toISOString().split('T')[0];
    const [form, setForm] = useState(initialData || { tanggal:todayStr, tipe:'Pemasukan', kategori:KATEGORI_PEMASUKAN[0], idPelanggan:'', nominal:'', keterangan:'' });
    const [nominalUI, setNominalUI] = useState(initialData ? formatNumberInput(initialData.nominal) : '');
    const [errorMsg, setErrorMsg] = useState(''); const [errorFields, setErrorFields] = useState([]);
    const getInS = (f) => ({ width:"100%", border:errorFields.includes(f)?"2px solid #DC2626":"1.5px solid #E5E7EB", borderRadius:10, padding:"11px 14px", fontSize:14, background:errorFields.includes(f)?"#FEF2F2":"#F9FAFB", marginBottom:12, fontWeight:500, color:"#111827", boxSizing:"border-box" });
    const lbS = { fontSize:12, fontWeight:700, color:"#6B7280", display:"block", marginBottom:6 };
    const kategoris = form.tipe === 'Pemasukan' ? KATEGORI_PEMASUKAN : KATEGORI_PENGELUARAN;
    const handleTipe = (t) => setForm({ ...form, tipe:t, kategori:(t==='Pemasukan'?KATEGORI_PEMASUKAN:KATEGORI_PENGELUARAN)[0] });
    const handleSave = () => {
      let errs = [];
      if (!form.tanggal) errs.push('tanggal');
      if (!form.nominal || Number(String(form.nominal).replace(/\D/g,''))===0) errs.push('nominal');
      if (errs.length>0) { setErrorFields(errs); setErrorMsg('Mohon lengkapi field yang ditandai.'); return; }
      onSave({ ...form, nominal: Number(String(form.nominal).replace(/\D/g,'')) });
    };
    return (
      <div className="modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
        <div className="modal-content">
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <h3 style={{ margin:0, fontSize:18, fontWeight:800 }}>{initialData?"Edit Transaksi":"Transaksi Baru"}</h3>
            <button onClick={onClose} style={{ background:"#F3F4F6", border:"none", borderRadius:10, width:36, height:36, fontSize:14, fontWeight:700, color:"#6B7280" }}>✕</button>
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:16 }}>
            {['Pemasukan','Pengeluaran'].map(t=>(
              <button key={t} onClick={()=>handleTipe(t)} style={{ flex:1, padding:12, borderRadius:10, border:"none", fontWeight:700, fontSize:14, cursor:"pointer", background:form.tipe===t?(t==='Pemasukan'?'#ECFDF5':'#FEF2F2'):'#F3F4F6', color:form.tipe===t?(t==='Pemasukan'?'#059669':'#DC2626'):'#9CA3AF' }}>
                {t==='Pemasukan'?'↑ Pemasukan':'↓ Pengeluaran'}
              </button>
            ))}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div>
              <label style={lbS}>Tanggal *</label>
              <input type="date" style={{...getInS('tanggal'),marginBottom:0}} value={form.tanggal} onChange={e=>setForm({...form,tanggal:e.target.value})}/>
            </div>
            <div>
              <label style={lbS}>Kategori</label>
              <select style={{...getInS('kategori'),marginBottom:0,color:"#111827"}} value={form.kategori} onChange={e=>setForm({...form,kategori:e.target.value})}>
                {kategoris.map(k=><option key={k} value={k}>{k}</option>)}
              </select>
            </div>
          </div>
          <div style={{ marginBottom:12 }}></div>
          <label style={lbS}>Nominal (Rp) *</label>
          <input type="tel" style={{...getInS('nominal'),fontWeight:700}} placeholder="0" value={nominalUI} onChange={e=>{ setNominalUI(formatNumberInput(e.target.value)); setForm({...form,nominal:e.target.value.replace(/\D/g,'')}); }}/>
          <label style={lbS}>ID Pelanggan <span style={{ fontWeight:400, color:"#9CA3AF" }}>(opsional)</span></label>
          <input style={getInS('idPelanggan')} placeholder="MR-0001" value={form.idPelanggan} onChange={e=>setForm({...form,idPelanggan:e.target.value.toUpperCase()})}/>
          <label style={lbS}>Keterangan</label>
          <textarea style={{...getInS('keterangan'),height:64,resize:"none"}} placeholder="Catatan singkat..." value={form.keterangan} onChange={e=>setForm({...form,keterangan:e.target.value})}/>
          {errorMsg && <div style={{ color:"#DC2626", fontSize:13, marginBottom:12, fontWeight:600, background:"#FEF2F2", padding:10, borderRadius:8 }}>{errorMsg}</div>}
          <div style={{ display:"flex", gap:10, marginTop:10 }}>
            {initialData && <button onClick={()=>onDelete(initialData)} style={{ padding:"14px 20px", background:"#FEF2F2", color:"#DC2626", border:"none", borderRadius:12, fontSize:15, fontWeight:700 }}>Hapus</button>}
            <button onClick={handleSave} style={{ flex:1, background:"linear-gradient(135deg,#7C3AED,#4C1D95)", color:"white", border:"none", borderRadius:12, padding:14, fontSize:15, fontWeight:700 }}>Simpan</button>
          </div>
        </div>
      </div>
    );
  };

  // ✅ NEW: SettingsPage Component
  const SettingsPage = ({ settings, saving, onSave, onLogout }) => {
    const [form, setForm] = useState({ namaBisnis: settings.namaBisnis||'', namaSales: settings.namaSales||'' });

          <div style={{ background:"#ECF8F1", borderRadius:12, padding:14, fontSize:12, color:"#111827", lineHeight:1.7, whiteSpace:"pre-wrap", fontFamily:"monospace", borderLeft:"3px solid #25D366" }}>{previewMsg}</div>

  // --- APP ---
  const App = () => {
    // === BILLING STATES (UNCHANGED) ===
    const [sessionPin, setSessionPin] = useState(null);
    const [pelanggan, setPelanggan] = useState([]);
    const [loading, setLoading] = useState(true);
    const [search, setSearch] = useState("");
    const [debouncedSearch, setDebouncedSearch] = useState("");
    const [filter, setFilter] = useState("semua");
    const [visibleCount, setVisibleCount] = useState(ITEM_PER_PAGE);
    const [showForm, setShowForm] = useState(false);
    const [editItem, setEditItem] = useState(null);
    const [toast, setToast] = useState(null);

    // ✅ NEW: Keuangan states
    const [currentPage, setCurrentPage] = useState('billing');
    const [keuangan, setKeuangan] = useState([]);
    const [loadingK, setLoadingK] = useState(false);
    const [kFilter, setKFilter] = useState('semua');
    const [katFilter, setKatFilter] = useState('semua');
    const [bulanFilter, setBulanFilter] = useState(() => { const n=new Date(); return {year:n.getFullYear(),month:n.getMonth()}; });
    const [showKForm, setShowKForm] = useState(false);

    const [appSettings, setAppSettings] = useState({ namaBisnis: 'MyRepublic', namaSales: 'Cahyo' });
    const [savingSettings, setSavingSettings] = useState(false);

    // ✅ NEW: Billing Rekap states
    const [billingView, setBillingView] = useState('pelanggan');
    const [bulanRekap, setBulanRekap] = useState(() => { const n=new Date(); return {year:n.getFullYear(),month:n.getMonth()}; });

    // === BILLING EFFECTS (UNCHANGED) ===
    useEffect(() => {
      if (!sessionPin) return;
      try { const cached=localStorage.getItem(STORAGE_KEY); if(cached) setPelanggan(JSON.parse(cached)); } catch(e) {}
      fetchData();
    }, [sessionPin]);
    useEffect(() => { const h=setTimeout(()=>{setDebouncedSearch(search);setVisibleCount(ITEM_PER_PAGE);},300); return()=>clearTimeout(h); }, [search]);
    useEffect(() => { setVisibleCount(ITEM_PER_PAGE); }, [filter]);

    // ✅ NEW effects
    useEffect(() => { if(currentPage==='keuangan'&&sessionPin) fetchKeuangan(); }, [currentPage,sessionPin]);

    useEffect(() => { setKatFilter('semua'); }, [kFilter]);

    // === BILLING FUNCTIONS (UNCHANGED) ===
    const showMsg = (msg, type="success") => { setToast({msg,type}); if(type!=="loading") setTimeout(()=>setToast(null),2500); };

      setLoading(true);
      fetch(`${SCRIPT_URL}?action=getAll&pin=${sessionPin}`).then(r=>r.json()).then(json=>{
        if(json.success){ setPelanggan(json.data); localStorage.setItem(STORAGE_KEY,JSON.stringify(json.data)); } else showMsg(json.error,"error");
        setLoading(false);
      }).catch(()=>{ showMsg("Gagal sinkron. Cek koneksi.","error"); setLoading(false); });
    };
    const callServerAction = (actionParams, payload=null, successMsg) => {
      showMsg("Memproses di Server...","loading");
      const opts = payload ? {method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({data:payload})} : {method:"GET"};
      fetch(`${SCRIPT_URL}?${actionParams}&pin=${sessionPin}`,opts).then(r=>r.json()).then(json=>{
        if(json.success){ showMsg(successMsg); setPelanggan(json.data); localStorage.setItem(STORAGE_KEY,JSON.stringify(json.data)); }
        else showMsg("Server Error: "+json.error,"error");
      }).catch(()=>showMsg("Gagal menghubungi server.","error"));
    };
    const handleSave = (dataToSave) => {
      const isEdit=!!dataToSave.id;
      const updated=isEdit?pelanggan.map(p=>p.id===dataToSave.id?dataToSave:p):[...pelanggan,{...dataToSave,id:String(Date.now())}];
      setShowForm(false); setEditItem(null);
      callServerAction(`action=save`,updated,"Data Tersimpan di Server!");

      if(typeof vibe!=="undefined") vibe();
      if(!window.confirm(`Batalkan 1x pembayaran untuk ${p.nama}?`)) return;
      callServerAction(`action=batal&id=${p.id}`,null,"Pembayaran Dibatalkan Server!");

      if(!window.confirm("Hapus data ini permanen?")) return;

      setShowForm(false);
      callServerAction(`action=save`,updated,"Data Dihapus Secara Permanen!");

        setLoadingK(false);
      }).catch(()=>{ showMsg("Gagal fetch data keuangan.","error"); setLoadingK(false); });
    };
    const callKeuanganAction = (updatedData, successMsg) => {
      showMsg("Menyimpan...","loading");
      fetch(`${SCRIPT_URL}?action=saveKeuangan&pin=${sessionPin}`,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({data:updatedData})})
        .then(r=>r.json()).then(json=>{
          if(json.success){ setKeuangan(json.data); showMsg(successMsg); }
          else showMsg("Error: "+json.error,"error");
        }).catch(()=>showMsg("Gagal menghubungi server.","error"));
    };
    const handleSaveK = (dataToSave) => {
      const isEdit=!!dataToSave.id;
      const item={...dataToSave,id:dataToSave.id||String(Date.now())};
      const updated=isEdit?keuangan.map(k=>k.id===item.id?item:k):[...keuangan,item];

      callKeuanganAction(updated,"Transaksi Tersimpan!");
    };
    const handleDeleteK = (item) => {
      if(!window.confirm("Hapus transaksi ini?")) return;
      const updated=keuangan.filter(k=>k.id!==item.id);
      setShowKForm(false); setEditKItem(null);
      callKeuanganAction(updated,"Transaksi Dihapus!");
    };
    const navBulan = (dir) => setBulanFilter(prev=>{ let m=prev.month+dir,y=prev.year; if(m<0){m=11;y--;} if(m>11){m=0;y++;} return{year:y,month:m}; });
    const navBulanRekap = (dir) => setBulanRekap(prev=>{ let m=prev.month+dir,y=prev.year; if(m<0){m=11;y--;} if(m>11){m=0;y++;} return{year:y,month:m}; });

    // ✅ NEW: Settings functions
    const fetchSettings = () => {
      fetch(`${SCRIPT_URL}?action=getSettings&pin=${sessionPin}`)
        .then(r=>r.json()).then(json=>{ if(json.success) setAppSettings(json.data); })
        .catch(()=>{});

    const handleSaveSettings = (data) => {
      setSavingSettings(true);
      fetch(`${SCRIPT_URL}?action=saveSettings&pin=${sessionPin}`,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({data})})
        .then(r=>r.json()).then(json=>{
          if(json.success){ setAppSettings(json.data); showMsg("Pengaturan Tersimpan!"); }
          else showMsg("Gagal simpan: "+json.error,"error");
          setSavingSettings(false);
        }).catch(()=>{ showMsg("Gagal menghubungi server.","error"); setSavingSettings(false); });
    };
    const handleLogout = () => {
      if(!window.confirm("Yakin mau logout?")) return;
      localStorage.removeItem(STORAGE_KEY);
      setSessionPin(null); setPelanggan([]); setKeuangan([]);
      setCurrentPage('billing'); setBillingView('pelanggan');
    };

    // === BILLING MEMOS (UNCHANGED) ===
    const stats = useMemo(() => {
      let lunas=0,belum=0,total=0;
      pelanggan.forEach(p=>{ if(p.statusKlien!=="Putus"){ total++; if(p.crm&&p.crm.nunggak===0) lunas++; else belum++; } });
      return {lunas,belum,total};
    },[pelanggan]);
    const filtered = useMemo(() => {
      return pelanggan.filter(p=>{
        const m=(p.nama||"").toLowerCase().includes(debouncedSearch.toLowerCase())||(p.customerId||"").toLowerCase().includes(debouncedSearch.toLowerCase());
        if(!m) return false;
        if(filter==="putus") return p.statusKlien==="Putus";
        if(p.statusKlien==="Putus") return false;
        const nunggak=p.crm?p.crm.nunggak:0, usia=p.crm?p.crm.usia:1, bayar=p.crm?p.crm.bayar:0;
        if(filter==="lunas") return nunggak===0; if(filter==="belum") return nunggak>0;
        if(filter==="c1") return usia>=1&&usia<=3; if(filter==="c4") return usia>=4&&usia<=6;
        if(filter==="c7") return usia>=7&&usia<=12; if(filter==="c12") return usia>12;
        if(filter==="b0") return bayar>=0&&bayar<=3; if(filter==="b4") return bayar>=4&&bayar<=6;
        if(filter==="b7") return bayar>=7&&bayar<=12; if(filter==="b12") return bayar>12;
        return true;
      }).sort((a,b)=>{
        const nA=a.crm?a.crm.nunggak:0, nB=b.crm?b.crm.nunggak:0;
        if(nA!==nB) return nB-nA;
        const uA=a.status?a.status.urgent:false, uB=b.status?b.status.urgent:false;
        if(uA!==uB) return uA?-1:1;
        return (a.crm?a.crm.tglTerbit:1)-(b.crm?b.crm.tglTerbit:1);
      });
    },[pelanggan,filter,debouncedSearch]);

    // ✅ NEW: Keuangan memos
    const filteredK = useMemo(() => {
      return keuangan.filter(k=>{
        const d=new Date(k.tanggal); if(isNaN(d.getTime())) return false;
        if(d.getFullYear()!==bulanFilter.year||d.getMonth()!==bulanFilter.month) return false;
        if(kFilter==='pemasukan'&&k.tipe!=='Pemasukan') return false;
        if(kFilter==='pengeluaran'&&k.tipe!=='Pengeluaran') return false;
        if(katFilter!=='semua'&&k.kategori!==katFilter) return false;
        return true;
      }).sort((a,b)=>new Date(b.tanggal)-new Date(a.tanggal));
    },[keuangan,bulanFilter,kFilter,katFilter]);
    const statsK = useMemo(() => {
      const ofBulan=keuangan.filter(k=>{ const d=new Date(k.tanggal); return !isNaN(d.getTime())&&d.getFullYear()===bulanFilter.year&&d.getMonth()===bulanFilter.month; });
      const masuk=ofBulan.filter(k=>k.tipe==='Pemasukan').reduce((s,k)=>s+Number(k.nominal||0),0);
      const keluar=ofBulan.filter(k=>k.tipe==='Pengeluaran').reduce((s,k)=>s+Number(k.nominal||0),0);
      return {masuk,keluar,net:masuk-keluar};
    },[keuangan,bulanFilter]);
    const katOptions = useMemo(()=>{ if(kFilter==='pemasukan') return KATEGORI_PEMASUKAN; if(kFilter==='pengeluaran') return KATEGORI_PENGELUARAN; return []; },[kFilter]);

    // ✅ NEW: Rekap Bulan billing memo
    const rekapStats = useMemo(() => {
      const lastDay = new Date(bulanRekap.year, bulanRekap.month + 1, 0);
      const firstDay = new Date(bulanRekap.year, bulanRekap.month, 1);
      const aktif = pelanggan.filter(p => {
        if (!p.joinDate || p.statusKlien === 'Putus') return false;
        const d = new Date(p.joinDate); return !isNaN(d.getTime()) && d <= lastDay;
      });
      const baru = pelanggan.filter(p => {
        if (!p.joinDate) return false;
        const d = new Date(p.joinDate); return !isNaN(d.getTime()) && d >= firstDay && d <= lastDay;
      });
      const totalTagihan = aktif.reduce((s,p) => s + Number(p.tagihan||0), 0);
      const now = new Date();
      const isCurMonth = bulanRekap.year === now.getFullYear() && bulanRekap.month === now.getMonth();
      let aman=0, jatuhTempo=0, telatBayar=0, suspend=0;
      if (isCurMonth) {
        aktif.forEach(p => {
          const ph = p.status ? p.status.phase : 'normal';
          if (ph==='normal') aman++;
          else if (ph==='jatuh_tempo') jatuhTempo++;
          else if (ph==='telat') telatBayar++;
          else if (ph==='suspend') suspend++;
        });
      }
      return { jumlahAktif:aktif.length, totalTagihan, pelangganBaru:baru.length, newCustomers:baru, aman, jatuhTempo, telatBayar, suspend, isCurMonth };
    }, [pelanggan, bulanRekap]);

    if (!sessionPin) return <LoginScreen onLoginSuccess={(pin)=>setSessionPin(pin)} />;

    return (

                  <div style={{ fontSize:11, letterSpacing:2, opacity:0.7, textTransform:"uppercase", fontWeight:700 }}>Customer Management</div>
                  <div style={{ fontSize:24, fontWeight:800 }}>MoraBilling <span style={{ fontSize:12, fontWeight:500, background:"#DC2626", padding:"2px 6px", borderRadius:4, verticalAlign:"middle" }}>SECURE</span></div>
                </div>
                <button onClick={()=>exportToCSV(pelanggan)} style={{ background:"rgba(255,255,255,0.15)", border:"none", borderRadius:12, padding:"8px 12px", color:"white", fontSize:12, fontWeight:700 }}>Export Semua CSV</button>
              </div>
              <div style={{ background:"rgba(255,255,255,0.1)", borderRadius:16, padding:15, marginTop:20 }}>
                <div style={{ fontSize:12, opacity:0.8, marginBottom:8 }}>Status Pelanggan Aktif ({stats.total} ID)</div>
                <div className="stats-row">
                  <div style={{ background:"rgba(16,185,129,0.2)", borderRadius:10, padding:12, textAlign:"center" }}>
                    <div style={{ fontSize:24, fontWeight:800, color:"#34D399" }}>{stats.lunas}</div>
                    <div style={{ fontSize:11, opacity:0.9, marginTop:4, fontWeight:600 }}>Lunas Berjalan</div>
                  </div>
                  <div style={{ background:"rgba(239,68,68,0.2)", borderRadius:10, padding:12, textAlign:"center" }}>
                    <div style={{ fontSize:24, fontWeight:800, color:"#FCA5A5" }}>{stats.belum}</div>
                    <div style={{ fontSize:11, opacity:0.9, marginTop:4, fontWeight:600 }}>Ada Tagihan</div>
                  </div>
                </div>
              </div>
            </div>
            <div className="sticky-controls">
              {/* ✅ NEW: View toggle */}
              <div style={{ display:"flex", gap:6, gridColumn:"1/-1" }}>
                {[['pelanggan','👥 Pelanggan'],['rekap','📊 Rekap Bulan']].map(([v,l])=>(
                  <button key={v} onClick={()=>setBillingView(v)} style={{ flex:1, padding:"9px", borderRadius:10, border:"1px solid #E5E7EB", fontSize:12, fontWeight:700, background:billingView===v?"#111827":"white", color:billingView===v?"white":"#6B7280" }}>{l}</button>
                ))}
              </div>
              {billingView==='pelanggan' && <React.Fragment>
              <div style={{ position:"relative" }}>
                <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", fontSize:16, pointerEvents:"none" }}>🔍</span>
                <input placeholder="Cari nama atau ID..." value={search} onChange={e=>setSearch(e.target.value)} style={{ width:"100%", padding:"12px 36px 12px 40px", borderRadius:12, border:"1px solid #E5E7EB", fontSize:14, fontWeight:500, background:"white", color:"#111827", boxSizing:"border-box" }}/>
              </div>
              <div className="filter-scroll">
                {[['semua','Semua Aktif'],['belum','Ada Tagihan'],['lunas','Lunas Semua'],['putus','Putus / Churn']].map(([v,l])=>(
                  <button key={v} onClick={()=>setFilter(v)} style={{ padding:"8px 14px", borderRadius:20, border:"1px solid #E5E7EB", fontSize:12, fontWeight:700, background:filter===v?"#111827":"white", color:filter===v?"white":"#6B7280", whiteSpace:"nowrap" }}>{l}</button>
                ))}
              </div>
              </React.Fragment>}
            </div>
            {/* ===== REKAP BULAN VIEW ===== */}
            {billingView==='rekap' && (
              <div style={{ padding:"0 16px" }}>
                {/* Month nav */}
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"white", borderRadius:16, padding:"14px 16px", marginBottom:14 }}>
                  <button onClick={()=>navBulanRekap(-1)} style={{ background:"#F3F4F6", border:"none", borderRadius:8, width:36, height:36, fontSize:18, cursor:"pointer" }}>‹</button>
                  <div style={{ textAlign:"center" }}>
                    <div style={{ fontSize:16, fontWeight:800, color:"#111827" }}>{BULAN_NAMES[bulanRekap.month]} {bulanRekap.year}</div>
                    {!rekapStats.isCurMonth && <div style={{ fontSize:11, color:"#9CA3AF", marginTop:2 }}>Status berdasarkan data terkini</div>}
                  </div>
                  <button onClick={()=>navBulanRekap(1)} style={{ background:"#F3F4F6", border:"none", borderRadius:8, width:36, height:36, fontSize:18, cursor:"pointer" }}>›</button>
                </div>

                {/* Main stats */}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:14 }}>
                  <div style={{ background:"white", borderRadius:14, padding:"14px 10px", textAlign:"center" }}>
                    <div style={{ fontSize:22, fontWeight:800, color:"#6D28D9" }}>{rekapStats.jumlahAktif}</div>
                    <div style={{ fontSize:10, color:"#6B7280", fontWeight:600, marginTop:4 }}>Aktif</div>
                  </div>
                  <div style={{ background:"white", borderRadius:14, padding:"14px 10px", textAlign:"center" }}>
                    <div style={{ fontSize:13, fontWeight:800, color:"#10B981", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{formatRupiah(rekapStats.totalTagihan)}</div>
                    <div style={{ fontSize:10, color:"#6B7280", fontWeight:600, marginTop:4 }}>Potensi/Bln</div>
                  </div>
                  <div style={{ background:"white", borderRadius:14, padding:"14px 10px", textAlign:"center" }}>
                    <div style={{ fontSize:22, fontWeight:800, color:"#F59E0B" }}>{rekapStats.pelangganBaru}</div>
                    <div style={{ fontSize:10, color:"#6B7280", fontWeight:600, marginTop:4 }}>Pelanggan Baru</div>
                  </div>
                </div>

                {/* Status breakdown — hanya bulan berjalan */}
                {rekapStats.isCurMonth && (
                  <div style={{ background:"white", borderRadius:16, padding:16, marginBottom:14 }}>
                    <div style={{ fontSize:13, fontWeight:800, color:"#374151", marginBottom:12 }}>Status Bulan Ini</div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                      {[['#ECFDF5','#059669',rekapStats.aman,'AMAN'],['#FFFBEB','#D97706',rekapStats.jatuhTempo,'JATUH TEMPO'],['#FFF7ED','#EA580C',rekapStats.telatBayar,'TELAT BAYAR'],['#FEF2F2','#DC2626',rekapStats.suspend,'SUSPEND']].map(([bg,color,val,label])=>(
                        <div key={label} style={{ background:bg, borderRadius:10, padding:"12px 8px", textAlign:"center" }}>
                          <div style={{ fontSize:24, fontWeight:800, color }}>{val}</div>
                          <div style={{ fontSize:10, color, fontWeight:700, marginTop:4 }}>{label}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Pelanggan baru bulan ini */}
                {rekapStats.newCustomers.length > 0 ? (
                  <div>
                    <div style={{ fontSize:13, fontWeight:800, color:"#374151", marginBottom:10 }}>🆕 Pelanggan Baru {BULAN_NAMES[bulanRekap.month]}</div>
                    <div style={{ display:"grid", gap:10 }}>
                      {rekapStats.newCustomers.map(p=>(
                        <div key={p.id} style={{ background:"white", borderRadius:14, padding:14, display:"flex", justifyContent:"space-between", alignItems:"center", borderLeft:"4px solid #6D28D9" }}>
                          <div>
                            <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:4 }}>
                              <span style={{ fontSize:11, fontWeight:800, color:"#6D28D9", background:"#EDE9FE", padding:"2px 7px", borderRadius:5 }}>{p.customerId}</span>
                            </div>
                            <div style={{ fontSize:14, fontWeight:800, color:"#111827" }}>{p.nama}</div>
                            <div style={{ fontSize:11, color:"#9CA3AF", marginTop:2 }}>Pasang: {formatDate(p.joinDate)}</div>
                          </div>
                          <div style={{ textAlign:"right" }}>
                            <div style={{ fontSize:16, fontWeight:800, color:"#10B981" }}>{formatRupiah(p.tagihan)}</div>
                            <div style={{ fontSize:10, color:"#9CA3AF", marginTop:2 }}>/bulan</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div style={{ textAlign:"center", padding:"30px 0", color:"#9CA3AF" }}>
                    <div style={{ fontSize:30, marginBottom:8 }}>📭</div>
                    <div style={{ fontSize:13, fontWeight:600 }}>Tidak ada pelanggan baru bulan ini</div>
                  </div>
                )}
              </div>
            )}

            {/* ===== PELANGGAN LIST VIEW ===== */}
            {billingView==='pelanggan' && <React.Fragment>
            <div className="customer-grid">
              {loading&&pelanggan.length===0 ? (
                <React.Fragment><SkeletonLoader/><SkeletonLoader/><SkeletonLoader/></React.Fragment>
              ) : filtered.slice(0,visibleCount).map(p=>{
                const isPutus=p.statusKlien==="Putus";
                const crm=p.crm||{usia:1,bayar:0,nunggak:0,tglTerbit:1};
                const status=p.status||{label:"Aman",color:"#059669",urgent:false};
                return (
                  <div key={p.id} className="card-enter" style={{ background:"white", padding:20, borderRadius:20, boxShadow:"0 2px 8px rgba(0,0,0,0.04)", borderLeft:`5px solid ${isPutus?"#9CA3AF":(status.color||"#10B981")}`, opacity:isPutus?0.6:1, filter:isPutus?"grayscale(100%)":"none", display:"flex", flexDirection:"column" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:16 }}>
                      <div>
                        <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center", marginBottom:8 }}>
                          <span style={{ fontSize:11, fontWeight:800, color:"#6D28D9", background:"#EDE9FE", padding:"3px 8px", borderRadius:6 }}>{p.customerId}</span>
                          <span style={{ fontSize:10, fontWeight:700, background:"#F3F4F6", color:"#4B5563", padding:"3px 8px", borderRadius:6 }}>Pasang: {formatDate(p.joinDate)}</span>
                          {/* ✅ NEW: Status tag */}
                          {!isPutus && status.tag && status.tag!=='AMAN' && (
                            <span style={{ fontSize:10, fontWeight:800, padding:"3px 8px", borderRadius:6, background:status.phase==='suspend'?'#FEF2F2':status.phase==='telat'?'#FFF7ED':'#FFFBEB', color:status.phase==='suspend'?'#DC2626':status.phase==='telat'?'#EA580C':'#D97706' }}>{status.tag}</span>
                          )}
                        </div>
                        <div style={{ fontSize:18, fontWeight:800, color:"#111827", textDecoration:isPutus?"line-through":"none" }}>{p.nama}</div>
                        <div style={{ fontSize:13, color:"#6B7280", marginTop:4, fontWeight:500 }}>{p.noWa}</div>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontSize:18, fontWeight:800, color:isPutus?"#6B7280":(crm.nunggak===0?"#10B981":"#111827"), textDecoration:isPutus?"line-through":"none" }}>{formatRupiah(p.tagihan)}</div>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      <span style={{ background:"#F3F4F6", color:"#374151", padding:"4px 8px", borderRadius:6, fontSize:10, fontWeight:700 }}>Usia: {crm.usia} Bln</span>
                      <span style={{ background:crm.bayar===0?"#F3F4F6":"#ECFDF5", color:crm.bayar===0?"#6B7280":"#059669", padding:"4px 8px", borderRadius:6, fontSize:10, fontWeight:700 }}>Total Bayar: {crm.bayar}x</span>
                      {crm.nunggak>0&&!isPutus&&<span style={{ background:"#FEF2F2", color:"#DC2626", padding:"4px 8px", borderRadius:6, fontSize:10, fontWeight:800 }}>Nunggak {crm.nunggak} Bln</span>}
                    </div>
                    {p.catatan&&<div style={{ fontSize:12, color:"#4B5563", marginTop:12, padding:"8px 12px", background:"#FFFBEB", borderLeft:"3px solid #D97706", borderRadius:6, fontWeight:500 }}>Catatan: {p.catatan}</div>}
                    <div style={{ marginTop:"auto" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:16, paddingTop:16, borderTop:"1px dashed #E5E7EB" }}>
                        <div style={{ fontSize:11, color:"#6B7280", fontWeight:500 }}>Terbit Tgl <b style={{ color:"#111827" }}>{crm.tglTerbit}</b></div>
                        {!isPutus&&crm.nunggak===0&&<span style={{ background:"#ECFDF5", color:"#059669", padding:"4px 10px", borderRadius:12, fontSize:10, fontWeight:800 }}>Aman</span>}
                      </div>
                      {!isPutus&&crm.nunggak>0&&<div style={{ fontSize:12, color:status.color, fontWeight:800, marginTop:8, textAlign:"right" }}>{status.label}</div>}
                      <div style={{ display:"flex", gap:8, marginTop:16 }}>
                        {!isPutus&&(
                          <React.Fragment>
                            <a href={p.waLink} target="_blank" style={{ flex:1, background:status.urgent?"#DC2626":"#10B981", color:"white", textAlign:"center", padding:10, borderRadius:10, fontSize:13, fontWeight:700, textDecoration:"none", display:"flex", alignItems:"center", justifyContent:"center" }}>WA Reminder</a>
                            <div style={{ display:"flex", flex:1, gap:6 }}>
                              <button onClick={()=>batalBayar(p)} disabled={crm.bayar<=0} style={{ flex:0.3, background:crm.bayar<=0?"#F9FAFB":"#FEF2F2", color:crm.bayar<=0?"#D1D5DB":"#DC2626", border:crm.bayar<=0?"1px solid #F3F4F6":"1px solid #FCA5A5", borderRadius:10, fontSize:16, fontWeight:800, cursor:crm.bayar<=0?"not-allowed":"pointer" }}>-</button>
                              <button onClick={()=>catatBayar(p)} disabled={crm.nunggak===0} style={{ flex:1, background:crm.nunggak===0?"#E5E7EB":"#ECFDF5", color:crm.nunggak===0?"#9CA3AF":"#059669", border:"none", borderRadius:10, fontSize:13, fontWeight:700, cursor:crm.nunggak===0?"not-allowed":"pointer" }}>{crm.nunggak===0?"✓ Lunas":"+ Bayar"}</button>
                            </div>
                          </React.Fragment>
                        )}
                        <button onClick={()=>{ if(typeof vibe!=="undefined") vibe(); setEditItem({...p}); setShowForm(true); }} style={{ flex:isPutus?1:0.4, padding:10, background:"#F3F4F6", border:"1px solid #E5E7EB", borderRadius:10, fontSize:13, color:"#374151", fontWeight:700 }}>Edit</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            {visibleCount<filtered.length&&!loading&&<button className="load-more-btn" onClick={()=>setVisibleCount(v=>v+ITEM_PER_PAGE)}>Tampilkan Lebih Banyak &darr;</button>}
            </React.Fragment>}
          </div>
        )}

        {/* ===== KEUANGAN PAGE ===== */}
        {currentPage==='keuangan' && (
          <div className="app-wrap">
            <div className="top-banner">
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontSize:11, letterSpacing:2, opacity:0.7, textTransform:"uppercase", fontWeight:700 }}>Keuangan Sales</div>
                  <div style={{ fontSize:24, fontWeight:800 }}>MoraBilling 💰</div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 }}>
                  {/* ✅ NEW: Export CSV */}
                  <button onClick={()=>exportKeuanganCSV(keuangan, bulanFilter.month, bulanFilter.year)} style={{ background:"rgba(255,255,255,0.15)", border:"none", borderRadius:10, padding:"6px 10px", color:"white", fontSize:11, fontWeight:700 }}>Export CSV</button>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <button onClick={()=>navBulan(-1)} style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:8, color:"white", width:34, height:34, fontSize:18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
                    <button onClick={()=>{ const n=new Date(); setBulanFilter({year:n.getFullYear(),month:n.getMonth()}); }} style={{ background:"rgba(255,255,255,0.15)", border:"none", borderRadius:8, color:"white", padding:"6px 10px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
                      {BULAN_SHORT[bulanFilter.month]} {bulanFilter.year}
                    </button>
                    <button onClick={()=>navBulan(1)} style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:8, color:"white", width:34, height:34, fontSize:18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>›</button>
                  </div>
                </div>
              </div>
              <div style={{ background:"rgba(255,255,255,0.1)", borderRadius:16, padding:15, marginTop:20 }}>
                <div style={{ fontSize:12, opacity:0.8, marginBottom:10 }}>{BULAN_NAMES[bulanFilter.month]} {bulanFilter.year}</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                  <div style={{ background:"rgba(16,185,129,0.2)", borderRadius:10, padding:10, textAlign:"center" }}>
                    <div style={{ fontSize:13, fontWeight:800, color:"#34D399", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{formatRupiah(statsK.masuk)}</div>
                    <div style={{ fontSize:10, opacity:0.9, marginTop:4, fontWeight:600 }}>↑ Masuk</div>
                  </div>
                  <div style={{ background:"rgba(239,68,68,0.2)", borderRadius:10, padding:10, textAlign:"center" }}>
                    <div style={{ fontSize:13, fontWeight:800, color:"#FCA5A5", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{formatRupiah(statsK.keluar)}</div>
                    <div style={{ fontSize:10, opacity:0.9, marginTop:4, fontWeight:600 }}>↓ Keluar</div>
                  </div>
                  <div style={{ background:statsK.net>=0?"rgba(16,185,129,0.2)":"rgba(239,68,68,0.2)", borderRadius:10, padding:10, textAlign:"center" }}>
                    <div style={{ fontSize:13, fontWeight:800, color:statsK.net>=0?"#34D399":"#FCA5A5", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{formatRupiah(Math.abs(statsK.net))}</div>
                    <div style={{ fontSize:10, opacity:0.9, marginTop:4, fontWeight:600 }}>Net {statsK.net>=0?"+":"-"}</div>
                  </div>
                </div>
              </div>
            </div>
            <div style={{ position:"sticky", top:0, zIndex:40, background:"#F3F4F6", padding:"15px 16px 10px", boxShadow:"0 4px 6px -1px rgba(0,0,0,0.05)", borderBottomLeftRadius:16, borderBottomRightRadius:16, marginBottom:16 }}>
              <div className="filter-scroll">
                {[['semua','Semua'],['pemasukan','↑ Pemasukan'],['pengeluaran','↓ Pengeluaran']].map(([v,l])=>(
                  <button key={v} onClick={()=>setKFilter(v)} style={{ padding:"8px 14px", borderRadius:20, border:"1px solid #E5E7EB", fontSize:12, fontWeight:700, background:kFilter===v?"#111827":"white", color:kFilter===v?"white":"#6B7280", whiteSpace:"nowrap" }}>{l}</button>
                ))}
              </div>
              {kFilter!=='semua' && (
                <div style={{ marginTop:8 }}>
                  <select value={katFilter} onChange={e=>setKatFilter(e.target.value)} style={{ width:"100%", padding:"10px 14px", borderRadius:10, border:"1px solid #E5E7EB", fontSize:13, fontWeight:600, background:"white", color:"#111827", outline:"none" }}>
                    <option value="semua">Semua Kategori</option>
                    {katOptions.map(k=><option key={k} value={k}>{k}</option>)}
                  </select>
                </div>
              )}
            </div>
            <div className="customer-grid">
              {loadingK ? (
                <React.Fragment><SkeletonLoader/><SkeletonLoader/></React.Fragment>
              ) : filteredK.length===0 ? (
                <div style={{ gridColumn:"1 / -1", textAlign:"center", padding:"60px 20px" }}>
                  <div style={{ fontSize:40, marginBottom:12 }}>💸</div>
                  <div style={{ fontSize:15, fontWeight:700, color:"#4B5563", marginBottom:6 }}>Belum ada transaksi</div>
                  <div style={{ fontSize:13, color:"#9CA3AF" }}>{kFilter==='semua'?'Tap + untuk catat pemasukan atau pengeluaran':`Tidak ada data ${kFilter} bulan ini`}</div>
                </div>
              ) : filteredK.map(item=><KeuanganCard key={item.id} item={item} onEdit={(it)=>{ setEditKItem(it); setShowKForm(true); }}/>)}
            </div>
          </div>
        )}

        {/* ===== SETTINGS PAGE ===== */}
        {currentPage==='settings' && (
          <div className="app-wrap">
            <div className="top-banner">
              <div style={{ fontSize:11, letterSpacing:2, opacity:0.7, textTransform:"uppercase", fontWeight:700 }}>Pengaturan</div>
              <div style={{ fontSize:24, fontWeight:800 }}>MoraBilling ⚙️</div>
            </div>
            <SettingsPage
              settings={appSettings}
              saving={savingSettings}
              onSave={handleSaveSettings}
              onLogout={handleLogout}
            />
          </div>
        )}

        {/* FAB Billing — naik ke bottom: 88 agar tidak tertutup nav */}
        {currentPage==='billing' && (
          <button onClick={()=>{ if(typeof vibe!=="undefined") vibe(); setEditItem(null); setShowForm(true); }}
            style={{ position:"fixed", bottom:88, right:20, width:60, height:60, borderRadius:30, background:"linear-gradient(135deg,#7C3AED,#4C1D95)", color:"white", border:"none", fontSize:32, fontWeight:300, boxShadow:"0 4px 15px rgba(76,29,149,0.4)", zIndex:50, cursor:"pointer" }}>+</button>
        )}

        {/* FAB Keuangan */}
        {currentPage==='keuangan' && (
          <button onClick={()=>{ setEditKItem(null); setShowKForm(true); }}
            style={{ position:"fixed", bottom:88, right:20, width:60, height:60, borderRadius:30, background:"linear-gradient(135deg,#7C3AED,#4C1D95)", color:"white", border:"none", fontSize:32, fontWeight:300, boxShadow:"0 4px 15px rgba(76,29,149,0.4)", zIndex:50, cursor:"pointer" }}>+</button>
        )}

        {/* Bottom Navigation */}
        <nav className="bottom-nav">
          {[['billing','📋','Billing'],['keuangan','💰','Keuangan'],['settings','⚙️','Settings']].map(([page,icon,label])=>(
            <button key={page} onClick={()=>setCurrentPage(page)}
              style={{ borderTop:`2px solid ${currentPage===page?'#6D28D9':'transparent'}` }}>
              <span style={{ fontSize:22 }}>{icon}</span>
              <span style={{ fontSize:11, fontWeight:700, color:currentPage===page?'#6D28D9':'#9CA3AF' }}>{label}</span>
            </button>
          ))}
        </nav>

        {showForm && <AddForm initialData={editItem} onSave={handleSave} onDelete={handleDelete} onClose={()=>{ setEditItem(null); setShowForm(false); }}/>}
        {showKForm && <KeuanganForm initialData={editKItem} onSave={handleSaveK} onDelete={handleDeleteK} onClose={()=>{ setEditKItem(null); setShowKForm(false); }}/>}

        {/* Toast — naik ke bottom: 80 agar tidak ketutup nav */}
        {toast && (
          <div style={{ position:"fixed", bottom:80, left:"50%", transform:"translateX(-50%)", background:toast.type==="error"?"#DC2626":toast.type==="loading"?"#4C1D95":"#111827", color:"white", padding:"12px 24px", borderRadius:12, fontSize:13, fontWeight:700, boxShadow:"0 4px 15px rgba(0,0,0,0.2)", zIndex:200, display:"flex", alignItems:"center", gap:10 }}>
            {toast.type==="loading"&&<span className="spinner"></span>}
            {toast.msg}
          </div>
        )}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
