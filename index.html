<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MoraRepublic CMS Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4C1D95" />
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192/4C1D95/FFFFFF?text=MR" />
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-color: #F3F4F6;
      --text-main: #111827;
      --text-muted: #6B7280;
      --card-bg: #FFFFFF;
      --purple: #6D28D9;
      --purple-dark: #4C1D95;
      --green: #10B981;
      --red: #DC2626;
      --border: #E5E7EB;
      --font: 'Plus Jakarta Sans', sans-serif;
    }
    
    /* Dark Mode Theme */
    [data-theme="dark"] {
      --bg-color: #111827;
      --text-main: #F9FAFB;
      --text-muted: #9CA3AF;
      --card-bg: #1F2937;
      --border: #374151;
    }
    
    html, body { height: 100%; background: var(--bg-color); font-family: var(--font); color: var(--text-main); transition: background 0.3s; }
    #root { height: 100%; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .card-enter { animation: fadeIn 0.3s ease forwards; }
    .sheet-enter { animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
    
    button { font-family: var(--font); cursor: pointer; }
    input, select, textarea { 
      outline: none; font-family: var(--font); background: var(--bg-color); 
      color: var(--text-main); border: 1.5px solid var(--border); 
    }
    input:focus, select:focus, textarea:focus { outline: 2px solid var(--purple); outline-offset: -1px; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useMemo } = React;

  // ===== KONFIGURASI =====
  const STORAGE_KEY = "myrepublic-pro-v2";
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYWv45OMHfDSO7y00Aa112lu5tmGpBidjP-ADrFMR_y367c70KpZd_3o7v3AvEFW7Y4w/exec";
  const HARI_TEMPO = 6;
  const PIN_RAHASIA = "2604"; 
  
  const PAKET_LIST = [
    { nama: "JET", harga: 218000, speed: null, color: "#6D28D9" },
    { nama: "NEO", harga: 233100, speed: "200 Mbps", color: "#2563EB" },
    { nama: "VALUE", harga: 277500, speed: "300 Mbps", color: "#059669" },
    { nama: "NEXUS", harga: 333000, speed: "400 Mbps", color: "#D97706" },
    { nama: "PRIME", harga: 555000, speed: "500 Mbps", color: "#DC2626" }
  ];

  const STATUS_KLIEN = ["Aktif", "Prospek", "Menunggak", "Isolasi", "Putus"];

  // ===== HELPER FUNCTIONS =====
  const getNow = () => new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" }));
  const formatRupiah = (n) => "Rp " + Number(n || 0).toLocaleString("id-ID");
  const cleanPhone = (wa) => {
    let n = String(wa || "").replace(/\D/g, "");
    if (n.startsWith("62")) return n;
    if (n.startsWith("0")) return "62" + n.slice(1);
    if (n.startsWith("8")) return "62" + n;
    return n;
  };
  
  const getCurrentBillingCycle = (t) => {
    const today = getNow();
    if (today.getDate() >= Number(t || 1)) return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}`;
    const prev = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    return `${prev.getFullYear()}-${String(prev.getMonth() + 1).padStart(2, "0")}`;
  };

  const isLunas = (p) => String(p.paidCycle || "").trim().substring(0, 7) === getCurrentBillingCycle(p.tanggalTerbit);
  
  const getBillingPhase = (t) => {
    const today = getNow();
    today.setHours(0,0,0,0);
    const terbit = new Date(today.getFullYear(), today.getMonth(), Number(t || 1));
    const jatuhTempo = new Date(today.getFullYear(), today.getMonth(), Number(t || 1) + HARI_TEMPO);
    
    if (today.getTime() === terbit.getTime()) return { phase: "terbit", label: "Terbit Hari Ini", color: "#DC2626", bg: "#FEF2F2", urgent: true };
    if (today > terbit && today < jatuhTempo) return { phase: "aktif", label: `JT ${Math.ceil((jatuhTempo - today) / 86400000)} hari lagi`, color: "#D97706", bg: "#FFFBEB", urgent: false };
    if (today >= jatuhTempo) return { phase: "lewat", label: "Jatuh Tempo!", color: "#DC2626", bg: "#FEF2F2", urgent: true };
    
    let targetTerbit = new Date(terbit);
    if(targetTerbit < today) targetTerbit.setMonth(targetTerbit.getMonth() + 1);
    return { phase: "normal", label: `${Math.ceil((targetTerbit - today) / 86400000)} hari lagi`, color: "#059669", bg: "#ECFDF5", urgent: false };
  };

  const getDaysUntilTerbit = (t) => {
    const today = getNow();
    today.setHours(0, 0, 0, 0);
    let terbit = new Date(today.getFullYear(), today.getMonth(), Number(t || 1));
    if (terbit <= today) terbit = new Date(today.getFullYear(), today.getMonth() + 1, Number(t || 1));
    return Math.ceil((terbit - today) / 86400000);
  };

  const buildWALink = (noWa, nama, t, tagihan, customerId, mode) => {
    const phone = cleanPhone(noWa);
    const bulan = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"][getNow().getMonth()];
    let jt = Number(t) + HARI_TEMPO;
    jt = jt > 31 ? jt - 30 : jt;
    
    const msg = mode === "promo" 
      ? `Halo *Kak ${nama}* 👋\n\nAda info promo spesial bulan ${bulan} dari MoraRepublic nih buat Kakak! 🎉\nYuk upgrade layanan internetnya sekarang.\n\nBalas pesan ini untuk info lebih lanjut ya Kak! 😊`
      : `Halo *Kak ${nama}* 👋\nMau mengingatkan untuk tagihan WiFi MyRepublic bulan ${bulan} sudah terbit 🙏\n\nNama : *${nama}*\nID : *${customerId}*\nTotal : *${formatRupiah(tagihan)}*\nJatuh Tempo : *Tgl ${jt} ${bulan}*\n\nMohon segera melakukan pembayaran agar layanan tidak terputus ya Kak 😊\nTerima kasih! 🙏`;
    
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  };

  const exportToCSV = (data) => {
    const headers = ["ID Pelanggan", "Nama", "No WA", "Paket", "Tagihan", "Tgl Terbit", "Status CRM", "Lunas Bulan Ini", "Catatan"];
    const rows = data.map(p => [
      p.customerId, p.nama, p.noWa, p.paket, p.tagihan, p.tanggalTerbit, p.statusKlien, isLunas(p) ? "Ya" : "Tidak", `"${(p.catatan || "").replace(/"/g, '""')}"`
    ]);
    const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `Data_Pelanggan_${getNow().getTime()}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  // ===== COMPONENTS =====
  const LoginScreen = ({ onLogin }) => {
    const [pin, setPin] = useState("");
    const [error, setError] = useState(false);
    const handleLogin = () => {
      if (pin === PIN_RAHASIA) onLogin();
      else { setError(true); setPin(""); setTimeout(() => setError(false), 500); }
    };
    return (
      <div style={{ height: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "linear-gradient(160deg, #5B21B6, #3B0764)", padding: 20 }}>
        <div className={error ? "shake" : ""} style={{ background: "white", padding: 30, borderRadius: 20, width: "100%", maxWidth: 360, textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>🔒</div>
          <h2 style={{ margin: "0 0 5px", color: "#111827" }}>Keamanan Sistem</h2>
          <p style={{ margin: "0 0 20px", color: "#6B7280", fontSize: 13 }}>Masukkan PIN untuk mengakses data.</p>
          <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleLogin()} placeholder="• • • •" style={{ width: "100%", textAlign: "center", fontSize: 24, letterSpacing: 10, padding: 15, borderRadius: 12, border: error ? "2px solid #DC2626" : "2px solid #E5E7EB", marginBottom: 20 }} maxLength={6} />
          <button onClick={handleLogin} style={{ width: "100%", background: "#6D28D9", color: "white", padding: 15, borderRadius: 12, border: "none", fontSize: 16, fontWeight: 700 }}>Buka Sistem</button>
        </div>
      </div>
    );
  };

  const AddForm = ({ initialData, onSave, onClose }) => {
    const [form, setForm] = useState(initialData || { customerId: "", nama: "", noWa: "", paket: "", tagihan: "", tanggalTerbit: "", startCycle: "", statusKlien: "Aktif", catatan: "" });
    const [error, setError] = useState("");

    const handleSave = () => {
      if (!form.customerId.trim()) return setError("ID Pelanggan wajib diisi");
      if (!form.nama.trim()) return setError("Nama wajib diisi");
      if (!form.noWa || form.noWa.length < 10) return setError("No. WhatsApp minimal 10 angka");
      onSave({ ...initialData, ...form, customerId: form.customerId.trim().toUpperCase(), joinDate: form.startCycle ? form.startCycle + "-01" : "" });
    };

    const inputStyle = { width: "100%", borderRadius: 10, padding: "11px 14px", fontSize: 14, marginBottom: 15 };
    
    return (
      <div style={{ padding: "0 20px 24px", background: "var(--card-bg)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, paddingTop: 10 }}>
          <h3 style={{ margin: 0 }}>{initialData ? "Edit Pelanggan" : "Pelanggan Baru"}</h3>
          <button onClick={onClose} style={{ background: "transparent", border: "none", fontSize: 20, color: "var(--text-main)" }}>✕</button>
        </div>

        <input style={{...inputStyle}} placeholder="ID Pelanggan (MR-0001)" value={form.customerId} onChange={e => setForm({...form, customerId: e.target.value})} />
        
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <input style={inputStyle} placeholder="Nama Lengkap" value={form.nama} onChange={e => setForm({...form, nama: e.target.value})} />
          <input style={inputStyle} type="tel" placeholder="No. WA (0812...)" value={form.noWa} onChange={e => {
              let n = e.target.value.replace(/\D/g, "");
              if (n.startsWith("62")) n = n;
              else if (n.startsWith("0")) n = "62" + n.slice(1);
              else if (n.startsWith("8")) n = "62" + n;
              setForm({...form, noWa: n});
            }} />
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 6, marginBottom: 15 }}>
          {PAKET_LIST.map(p => (
            <button key={p.nama} onClick={() => setForm({...form, paket: p.nama, tagihan: String(p.harga)})} style={{ border: form.paket === p.nama ? `2px solid ${p.color}` : "1.5px solid var(--border)", borderRadius: 8, padding: "8px 4px", background: form.paket === p.nama ? p.color+"15" : "transparent", color: "var(--text-main)", fontSize: 11, fontWeight: 700 }}>
              {p.nama}
            </button>
          ))}
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <input style={inputStyle} type="tel" placeholder="Tagihan (Rp)" value={form.tagihan ? formatRupiah(form.tagihan) : ""} onChange={e => setForm({...form, tagihan: e.target.value.replace(/\D/g, "")})} />
          <select style={inputStyle} value={form.statusKlien} onChange={e => setForm({...form, statusKlien: e.target.value})}>
            {STATUS_KLIEN.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <select style={inputStyle} value={form.tanggalTerbit} onChange={e => setForm({...form, tanggalTerbit: e.target.value})}>
            <option value="">Tgl Terbit</option>
            {Array.from({length: 31}, (_, i) => <option key={i+1} value={i+1}>Tgl {i+1}</option>)}
          </select>
          <input style={inputStyle} type="month" value={form.startCycle} onChange={e => setForm({...form, startCycle: e.target.value})} />
        </div>

        <textarea style={{...inputStyle, height: 80, resize: "none"}} placeholder="Catatan CRM (Contoh: Janji bayar tgl 15...)" value={form.catatan} onChange={e => setForm({...form, catatan: e.target.value})} />

        {error && <div style={{ color: "#DC2626", fontSize: 13, marginBottom: 10, fontWeight: 600 }}>⚠️ {error}</div>}
        <button onClick={handleSave} style={{ width: "100%", background: "#4C1D95", color: "white", border: "none", borderRadius: 12, padding: "14px", fontSize: 15, fontWeight: 700 }}>Simpan Data</button>
      </div>
    );
  };

  const App = () => {
    const [isLoggedIn, setIsLoggedIn] = useState(false);
    const [pelanggan, setPelanggan] = useState([]);
    const [loading, setLoading] = useState(true);
    const [filter, setFilter] = useState("semua");
    const [search, setSearch] = useState("");
    const [showForm, setShowForm] = useState(false);
    const [editItem, setEditItem] = useState(null);
    const [mode, setMode] = useState("tagihan"); 
    const [theme, setTheme] = useState("light");
    const [visibleCount, setVisibleCount] = useState(15); 

    useEffect(() => {
      const savedTheme = localStorage.getItem("mr-theme");
      if(savedTheme) setTheme(savedTheme);
      document.documentElement.setAttribute('data-theme', savedTheme || 'light');
    }, []);

    const toggleTheme = () => {
      const newTheme = theme === "light" ? "dark" : "light";
      setTheme(newTheme);
      localStorage.setItem("mr-theme", newTheme);
      document.documentElement.setAttribute('data-theme', newTheme);
    };

    useEffect(() => {
      if (!isLoggedIn) return;
      try { const cached = localStorage.getItem(STORAGE_KEY); if (cached) setPelanggan(JSON.parse(cached)); } catch (e) {}
      fetch(SCRIPT_URL + "?action=getAll").then(res => res.json()).then(json => {
        if (json.success) { setPelanggan(json.data); localStorage.setItem(STORAGE_KEY, JSON.stringify(json.data)); }
        setLoading(false);
      }).catch(() => setLoading(false));
    }, [isLoggedIn]);

    const syncData = (data) => {
      setPelanggan(data);
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
      fetch(SCRIPT_URL + "?action=save", {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(data)
      }).catch(err => console.warn("Sync GAS gagal:", err));
    };

    const handleSave = (data) => {
      const updated = editItem ? pelanggan.map(p => p.id === data.id ? data : p) : [...pelanggan, { ...data, id: Date.now(), paidCycle: null }];
      syncData(updated); setShowForm(false); setEditItem(null);
    };

    const toggleLunas = (p) => {
      const cycle = getCurrentBillingCycle(p.tanggalTerbit);
      syncData(pelanggan.map(x => x.id === p.id ? { ...x, paidCycle: p.paidCycle === cycle ? null : cycle } : x));
    };

    const handleDelete = (id) => {
      if(window.confirm("Yakin hapus?")) syncData(pelanggan.filter(x => x.id !== id));
    };

    const stats = useMemo(() => {
      let lunas = 0, belum = 0, uLunas = 0, uBelum = 0;
      pelanggan.forEach(p => {
        const amt = Number(p.tagihan) || 0;
        if (isLunas(p)) { lunas++; uLunas += amt; } else { belum++; uBelum += amt; }
      });
      return { lunas, belum, total: uLunas + uBelum, uLunas, uBelum };
    }, [pelanggan]);

    const filtered = useMemo(() => {
      return pelanggan.filter(p => {
        const m = (p.nama||"").toLowerCase().includes(search.toLowerCase()) || (p.customerId||"").toLowerCase().includes(search.toLowerCase());
        if (filter === "lunas") return m && isLunas(p);
        if (filter === "belum") return m && !isLunas(p);
        return m;
      }).sort((a, b) => {
        const aU = !isLunas(a) && ["terbit", "aktif", "lewat"].includes(getBillingPhase(a.tanggalTerbit).phase);
        const bU = !isLunas(b) && ["terbit", "aktif", "lewat"].includes(getBillingPhase(b.tanggalTerbit).phase);
        return aU !== bU ? (aU ? -1 : 1) : getDaysUntilTerbit(a.tanggalTerbit) - getDaysUntilTerbit(b.tanggalTerbit);
      });
    }, [pelanggan, filter, search]);

    if (!isLoggedIn) return <LoginScreen onLogin={() => setIsLoggedIn(true)} />;
    if (loading) return <div style={{display:"flex", height:"100vh", justifyContent:"center", alignItems:"center"}}>Memuat data...</div>;

    return (
      <div style={{ maxWidth: 480, margin: "0 auto", paddingBottom: 100 }}>
        {/* Header */}
        <div style={{ background: "linear-gradient(160deg, #5B21B6, #4C1D95)", padding: "20px 20px 25px", color: "white", borderBottomLeftRadius: 24, borderBottomRightRadius: 24 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: 2, opacity: 0.7, textTransform: "uppercase", fontWeight: 700 }}>Dashboard</div>
              <div style={{ fontSize: 22, fontWeight: 800 }}>MoraRepublic</div>
            </div>
            <div style={{display: "flex", gap: 10}}>
              <button onClick={toggleTheme} style={{ background: "rgba(255,255,255,0.1)", border: "none", borderRadius: "50%", width: 36, height: 36, color: "white", fontSize: 16 }}>{theme === 'light' ? '🌙' : '☀️'}</button>
              <button onClick={() => exportToCSV(pelanggan)} style={{ background: "rgba(255,255,255,0.1)", border: "none", borderRadius: "50%", width: 36, height: 36, color: "white", fontSize: 16 }} title="Export CSV">📥</button>
            </div>
          </div>

          <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 16, padding: 15 }}>
            <div style={{ fontSize: 12, opacity: 0.8, marginBottom: 4 }}>Potensi Omzet</div>
            <div style={{ fontSize: 28, fontWeight: 800, marginBottom: 10 }}>{formatRupiah(stats.total)}</div>
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1, background: "rgba(16, 185, 129, 0.2)", borderRadius: 10, padding: 10 }}>
                <div style={{ fontSize: 10, opacity: 0.8 }}>Cair ({stats.lunas})</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#34D399" }}>{formatRupiah(stats.uLunas)}</div>
              </div>
              <div style={{ flex: 1, background: "rgba(239, 68, 68, 0.2)", borderRadius: 10, padding: 10 }}>
                <div style={{ fontSize: 10, opacity: 0.8 }}>Nunggak ({stats.belum})</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#FCA5A5" }}>{formatRupiah(stats.uBelum)}</div>
              </div>
            </div>
          </div>
        </div>

        {/* Toolbar */}
        <div style={{ padding: "20px 16px 10px" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 15 }}>
            <button onClick={() => setMode("tagihan")} style={{ flex: 1, background: mode === "tagihan" ? "var(--purple)" : "transparent", color: mode === "tagihan" ? "white" : "var(--text-muted)", border: "1.5px solid var(--border)", padding: "10px", borderRadius: 10, fontSize: 12, fontWeight: 700 }}>📝 Tagihan</button>
            <button onClick={() => setMode("promo")} style={{ flex: 1, background: mode === "promo" ? "var(--orange)" : "transparent", color: mode === "promo" ? "white" : "var(--text-muted)", border: "1.5px solid var(--border)", padding: "10px", borderRadius: 10, fontSize: 12, fontWeight: 700 }}>🎁 Promo</button>
          </div>

          <input placeholder="🔍 Cari nama / ID..." value={search} onChange={e => { setSearch(e.target.value); setVisibleCount(15); }} style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: "1.5px solid var(--border)", marginBottom: 15, background: "var(--card-bg)" }} />
          
          <div style={{ display: "flex", gap: 8 }}>
            {[['semua', 'Semua'], ['belum', 'Belum Bayar'], ['lunas', 'Lunas']].map(([v, l]) => (
              <button key={v} onClick={() => { setFilter(v); setVisibleCount(15); }} style={{ padding: "6px 14px", borderRadius: 20, border: "1px solid var(--border)", fontSize: 12, fontWeight: 700, background: filter === v ? "var(--text-main)" : "var(--card-bg)", color: filter === v ? "var(--bg-color)" : "var(--text-muted)" }}>{l}</button>
            ))}
          </div>
        </div>

        {/* List */}
        <div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 12 }}>
          {filtered.slice(0, visibleCount).map(p => {
            const lunas = isLunas(p);
            const status = getBillingPhase(p.tanggalTerbit);
            return (
              <div key={p.id} className="card-enter" style={{ background: "var(--card-bg)", padding: 16, borderRadius: 16, borderLeft: `4px solid ${lunas ? "var(--green)" : status.color}`, opacity: lunas ? 0.7 : 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <div>
                    <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:4 }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)" }}>#{p.customerId}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, background: "var(--bg-color)", padding: "2px 6px", borderRadius: 4 }}>{p.statusKlien || "Aktif"}</span>
                    </div>
                    <div style={{ fontSize: 16, fontWeight: 800 }}>{p.nama}</div>
                    <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>📱 {p.noWa}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ display: "inline-block", background: "var(--bg-color)", padding: "2px 8px", borderRadius: 6, fontSize: 10, fontWeight: 800, marginBottom: 4 }}>{p.paket}</div>
                    <div style={{ fontSize: 16, fontWeight: 800, color: lunas ? "var(--green)" : "var(--text-main)" }}>{formatRupiah(p.tagihan)}</div>
                  </div>
                </div>
                
                {p.catatan && <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 10, padding: 8, background: "var(--bg-color)", borderRadius: 8 }}>📝 {p.catatan}</div>}

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12, paddingTop: 12, borderTop: "1px dashed var(--border)" }}>
                  <div style={{ fontSize: 11, color: "var(--text-muted)" }}>Terbit <b>{p.tanggalTerbit}</b> → JT <b>{Number(p.tanggalTerbit) + HARI_TEMPO > 31 ? Number(p.tanggalTerbit) + HARI_TEMPO - 30 : Number(p.tanggalTerbit) + HARI_TEMPO}</b></div>
                  {!lunas && <span style={{ background: status.bg, color: status.color, padding: "3px 8px", borderRadius: 10, fontSize: 10, fontWeight: 700 }}>● {status.label}</span>}
                </div>

                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <a href={buildWALink(p.noWa, p.nama, p.tanggalTerbit, p.tagihan, p.customerId, mode)} target="_blank" style={{ flex: 1, background: mode === "promo" ? "var(--orange)" : (status.urgent && !lunas ? "var(--red)" : "var(--green)"), color: "white", textAlign: "center", padding: "10px", borderRadius: 10, fontSize: 12, fontWeight: 700, textDecoration: "none" }}>
                    {mode === "promo" ? "🎁 Promo" : "💬 WA Reminder"}
                  </a>
                  <button onClick={() => toggleLunas(p)} style={{ flex: 1, background: lunas ? "transparent" : "var(--bg-color)", color: lunas ? "var(--red)" : "var(--green)", border: "1.5px solid var(--border)", borderRadius: 10, fontSize: 12, fontWeight: 700 }}>
                    {lunas ? "Batal Lunas" : "✓ Lunas"}
                  </button>
                  <button onClick={() => { setEditItem({...p, startCycle: p.joinDate?.substring(0,7)}); setShowForm(true); }} style={{ width: 40, background: "var(--bg-color)", color: "var(--text-main)", border: "none", borderRadius: 10 }}>✏️</button>
                  <button onClick={() => handleDelete(p.id)} style={{ width: 40, background: "rgba(220,38,38,0.1)", color: "var(--red)", border: "none", borderRadius: 10 }}>🗑️</button>
                </div>
              </div>
            );
          })}
          {filtered.length > visibleCount && <button onClick={() => setVisibleCount(c => c + 15)} style={{ padding: 15, background: "var(--card-bg)", border: "1.5px solid var(--border)", borderRadius: 12, color: "var(--purple)", fontWeight: 700, fontSize: 14 }}>Muat Lebih Banyak</button>}
        </div>

        <button onClick={() => { setEditItem(null); setShowForm(true); }} style={{ position: "fixed", bottom: 20, right: 20, width: 60, height: 60, borderRadius: 30, background: "var(--purple-dark)", color: "white", border: "none", fontSize: 30, boxShadow: "0 4px 15px rgba(76,29,149,0.4)" }}>+</button>

        {showForm && (
          <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end" }}>
            <div className="sheet-enter" style={{ background: "var(--bg-color)", width: "100%", borderTopLeftRadius: 24, borderTopRightRadius: 24, maxHeight: "90vh", overflowY: "auto" }}>
              <AddForm initialData={editItem} onSave={handleSave} onClose={() => setShowForm(false)} />
            </div>
          </div>
        )}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  // PWA Service Worker Registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Registration failed:', err));
    });
  }
</script>
</body>
</html>
