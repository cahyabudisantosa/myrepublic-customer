<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoraRepublic CMS</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }
    .container { max-width: 480px; margin: 0 auto; }
    .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxZHqpohHYjFpj3mpDvgTF-55hJLoTeaKVLnq7DXS8Lu0RibQcO3_PrbbLISyGTNcvBw/exec";
    const PIN_RAHASIA = "2604";

    function App() {
      const [isLoggedIn, setIsLoggedIn] = React.useState(false);
      const [pin, setPin] = React.useState("");
      const [data, setData] = React.useState([]);
      const [loading, setLoading] = React.useState(false);

      const handleLogin = () => {
        if (pin === PIN_RAHASIA) {
          setIsLoggedIn(true);
          fetchData();
        } else {
          alert("PIN Salah");
        }
      };

      const fetchData = () => {
        setLoading(true);
        fetch(SCRIPT_URL + "?action=getAll")
          .then(res => res.json())
          .then(json => {
            if (json.success) setData(json.data);
            setLoading(false);
          })
          .catch(err => {
            alert("Gagal memuat data: " + err);
            setLoading(false);
          });
      };

      if (!isLoggedIn) {
        return (
          <div className="container" style={{textAlign: "center"}}>
            <h2>Login</h2>
            <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} />
            <button onClick={handleLogin}>Masuk</button>
          </div>
        );
      }

      return (
        <div className="container">
          <h2>Dashboard</h2>
          <button onClick={fetchData}>Refresh Data</button>
          {loading ? <p>Memuat...</p> : (
            data.length > 0 ? 
            data.map(p => <div key={p.id} className="card">{p.nama} - {p.tagihan}</div>) : 
            <p>Data kosong atau gagal dimuat.</p>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
