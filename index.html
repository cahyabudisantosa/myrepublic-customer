<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoraRepublic CMS</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #f3f4f6; margin: 0; padding: 10px; }
    .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; background: #6D28D9; color: white; margin: 5px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxZHqpohHYjFpj3mpDvgTF-55hJLoTeaKVLnq7DXS8Lu0RibQcO3_PrbbLISyGTNcvBw/exec";
    const PIN = "2604";

    function App() {
      const [isLoggedIn, setIsLoggedIn] = React.useState(false);
      const [pin, setPin] = React.useState("");
      const [data, setData] = React.useState([]);

      if (!isLoggedIn) {
        return (
          <div style={{textAlign: "center", marginTop: "50px"}}>
            <h2>Login</h2>
            <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} />
            <button onClick={() => { if(pin === PIN) setIsLoggedIn(true); else alert("Salah PIN"); }}>Masuk</button>
          </div>
        );
      }

      return (
        <div>
          <h2>Dashboard</h2>
          <button onClick={() => {
            fetch(SCRIPT_URL + "?action=getAll")
              .then(res => res.json())
              .then(json => setData(json.data));
          }}>Load Data</button>
          {data.map(p => (
            <div key={p.id} className="card">
              <strong>{p.nama}</strong><br/>
              ID: {p.customerId} - Tagihan: {p.tagihan}
            </div>
          ))}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
